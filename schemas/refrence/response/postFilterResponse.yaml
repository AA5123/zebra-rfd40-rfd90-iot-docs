title: postFilterPayload
x-stoplight:
  id: y5oysu0o0kuvb
type: object
properties:
  postFilter:
    type: array
    description: A list of post-filter configurations.
    items:
      type: object
      properties:
        dataEpType:
          type: string
          description: The type of data endpoint.
        matchPattern:
          type: string
          description: The pattern to match during filtering.
        matchPatternMethod:
          type: string
          description: The method used to apply the match pattern.
        reportOperation:
          type: string
          description: The operation type for reporting.
        reportDuration:
          type: integer
          description: The duration (in seconds) for the report operation.
        seenCount:
          type: integer
          description: The number of times the filter condition has been met.
        rssiThreshold:
          type: integer
          description: The RSSI (Received Signal Strength Indicator) threshold value.
        tagList:
          type: object
          description: A list of tags and their associated operations.
          properties:
            operation:
              type: string
              description: The operation to be performed on the tags.
            tagPatterns:
              type: array
              description: A list of tag patterns to be included or excluded.
              items:
                type: string
                description: A tag pattern string.