asyncapi: 2.4.0

info:
  title: RFD40 / RFD90 IoT Connector Device Status API (MQTT)
  version: v1
  description: |
    Device Status flow for RFD40/90 over MQTT.
    - Publish `get_status` to the command topic.
    - Subscribe to the response topic for health and status data.

servers:
  mqttBroker:
    url: localhost:1883
    protocol: mqtt
    description: MQTT broker configured in the reader endpoint.

channels:
  '{tenantId}/CTRL/clients/cmnd/{deviceSerialNo}':
    description: Publish `get_status` commands (Cloud to Device).
    parameters:
      tenantId:
        description: Tenant identifier.
        schema:
          type: string
      deviceSerialNo:
        description: Reader serial number.
        schema:
          type: string
    publish:
      operationId: publishGetStatus
      summary: Publish get_status command
      message:
        $ref: '#/components/messages/GetStatusCommand'

  '{tenantId}/CTRL/clients/resp/{deviceSerialNo}':
    description: Subscribe for get_status command responses (Device to Cloud).
    parameters:
      tenantId:
        description: Tenant identifier.
        schema:
          type: string
      deviceSerialNo:
        description: Reader serial number.
        schema:
          type: string
    subscribe:
      operationId: subscribeGetStatusResponse
      summary: Receive get_status responses
      message:
        $ref: '#/components/messages/GetStatusResponse'

components:
  messages:
    GetStatusCommand:
      name: GetStatusCommand
      title: MQTT get_status command payload
      contentType: application/json
      correlationId:
        location: $message.payload#/requestId
      payload:
        $ref: '#/components/schemas/GetStatusCommandPayload'
      examples:
        - name: getStatusRequest
          payload:
            command: get_status
            requestId: req-1

    GetStatusResponse:
      name: GetStatusResponse
      title: MQTT get_status response payload
      contentType: application/json
      correlationId:
        location: $message.payload#/requestId
      payload:
        $ref: '#/components/schemas/GetStatusResponsePayload'
      examples:
        - name: getStatusSuccess
          payload:
            command: get_status
            requestId: req-1
            apiVersion: V1.1
            deviceStatus:
              powerSource: USB
              radioActivity: INACTIVE
              radioConnection: CONNECTED
              hostname: RFD40-212735201D0053.local
              systemTime: '2024-02-26T13:45:53.728Z'
              temperature: 32
              ntp:
                offset: 0
                reach: 0
              terminalConnection:
                status: connected
                type: USB
              batteryStatus:
                capacity: 6400
                stateOfHealth: GOOD
                chargePercentage: 100
                chargeStatus: 1
            response:
              code: 0
              description: Success

  schemas:
    GetStatusCommandPayload:
      type: object
      required:
        - command
        - requestId
      properties:
        command:
          type: string
          enum:
            - get_status
          description: Must be `get_status`.
        requestId:
          type: string
          description: Client-generated request ID used for response correlation.
      additionalProperties: false

    GetStatusResponsePayload:
      type: object
      required:
        - command
        - requestId
        - apiVersion
        - response
      properties:
        command:
          type: string
          enum:
            - get_status
        requestId:
          type: string
        apiVersion:
          type: string
          enum:
            - V1.0
            - V1.1
        deviceStatus:
          $ref: '#/components/schemas/DeviceStatus'
        response:
          $ref: '#/components/schemas/CommandResponse'
      additionalProperties: true

    DeviceStatus:
      type: object
      properties:
        powerSource:
          type: string
          enum:
            - DC
            - WALLCHARGER
            - USB
            - CRADLE
        radioActivity:
          type: string
          enum:
            - INACTIVE
            - ACTIVE
        radioConnection:
          type: string
          enum:
            - CONNECTED
            - DISCONNECTED
        hostname:
          type: string
        systemTime:
          type: string
          format: date-time
        temperature:
          type: integer
        ntp:
          type: object
          properties:
            offset:
              type: integer
            reach:
              type: integer
        terminalConnection:
          type: object
          properties:
            status:
              type: string
              enum:
                - connected
                - disconnected
            type:
              type: string
              enum:
                - BLUETOOTH
                - CIO
                - USB
        batteryStatus:
          type: object
          properties:
            capacity:
              type: integer
            stateOfHealth:
              type: string
              enum:
                - GOOD
                - AVERAGE
                - POOR
            chargePercentage:
              type: integer
            chargeStatus:
              type: integer
              description: 0=not connected, 1=charging, 2=full.
      additionalProperties: true

    CommandResponse:
      type: object
      required:
        - code
        - description
      properties:
        code:
          type: integer
        description:
          type: string
