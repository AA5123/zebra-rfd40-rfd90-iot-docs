<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>API Reference - RFD40 / RFD90 IOT developer guide</title>
  <link href="https://fonts.googleapis.com/css?family=Inter:400,600,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/redoc-zebra.css?v=14" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: #fff; }
    rapi-doc { width: 100%; height: 100%; }
    rapi-doc::part(section-operation-summary) { font-size: 1.1rem; }
  </style>
</head>
<body>
  <rapi-doc
    spec-url="openapi.yaml"
    render-style="read"
    show-header="false"
    show-side-nav="true"
    nav-bg-color="#ffffff"
    nav-text-color="#333333"
    nav-hover-bg-color="#f2f3f3"
    nav-hover-text-color="#0073bb"
    nav-accent-color="#0073bb"
    primary-color="#2563eb"
    bg-color="#ffffff"
    text-color="#333333"
    header-color="#1e293b"
    font-size="regular"
    regular-font="Inter, Segoe UI, system-ui, sans-serif"
    mono-font="Consolas, Monaco, monospace"
    schema-style="table"
    schema-expand-level="1"
    default-schema-tab="example"
    show-method-in-nav-bar="false"
    use-path-in-nav-bar="false"
    allow-try="false"
    allow-server-selection="false"
    allow-authentication="false"
  >
  </rapi-doc>

  <script type="module" src="https://unpkg.com/rapidoc/dist/rapidoc-min.js"></script>
  <script>
  (function() {
    /* After RapiDoc loads, hide HTTP method badges (POST/GET) since this is MQTT */
    function hideHttpMethods() {
      var rd = document.querySelector('rapi-doc');
      if (!rd || !rd.shadowRoot) return;
      var style = rd.shadowRoot.querySelector('style[data-mqtt-hide]');
      if (!style) {
        style = document.createElement('style');
        style.setAttribute('data-mqtt-hide', '1');
        style.textContent = [
          '.method-fg { display: none !important; }',
          '.req-res-title .method { display: none !important; }',
          '.nav-bar-tag-and-paths .method { display: none !important; }',
          '[class*="method"] { display: none !important; }',
          '.endpoint-head .method { display: none !important; }',
          '.path { display: none !important; }',
          /* Compact example boxes - reduce wasted space */
          'textarea.request-body-param-user-input { min-height: 40px !important; max-height: 180px !important; height: auto !important; resize: vertical !important; }',
          '.example-panel pre, .request-body-container pre, .response-body-container pre { margin: 0 !important; padding: 8px 12px !important; max-height: 250px !important; overflow: auto !important; }',
          '.example-panel, .req-resp-container { margin-bottom: 6px !important; }',
          'pre { max-height: 250px !important; overflow: auto !important; padding: 8px 12px !important; }',
          'pre.code-sample { max-height: 250px !important; }',
          '.tab-panel { padding: 4px 0 !important; }',
          '.request-body-container, .response-body-container { padding: 4px 0 !important; }',
          '.tree { max-height: 250px !important; overflow: auto !important; }',
        ].join('\n');
        rd.shadowRoot.appendChild(style);
      }
    }
    /* Poll until RapiDoc shadow DOM is ready */
    var attempts = 0;
    var poll = setInterval(function() {
      hideHttpMethods();
      addCopyButtons();
      if (++attempts > 30) clearInterval(poll);
    }, 500);

    /* Add copy buttons to all <pre> code blocks inside RapiDoc */
    function addCopyButtons() {
      var rd = document.querySelector('rapi-doc');
      if (!rd || !rd.shadowRoot) return;
      var pres = rd.shadowRoot.querySelectorAll('pre');
      for (var i = 0; i < pres.length; i++) {
        var pre = pres[i];
        if (pre.querySelector('.copy-btn')) continue;
        pre.style.position = 'relative';
        var btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copy';
        btn.style.cssText = 'position:absolute;top:4px;right:4px;padding:3px 10px;font-size:11px;cursor:pointer;background:#e2e8f0;border:1px solid #cbd5e1;border-radius:4px;color:#334155;z-index:10;';
        btn.addEventListener('click', (function(target) {
          return function() {
            var text = target.textContent.replace(/^Copy/, '').trim();
            navigator.clipboard.writeText(text).then(function() {
              target.querySelector('.copy-btn').textContent = 'Copied!';
              setTimeout(function() { target.querySelector('.copy-btn').textContent = 'Copy'; }, 1500);
            });
          };
        })(pre));
        pre.appendChild(btn);
      }
    }
  })();
  </script>
</body>
</html>
