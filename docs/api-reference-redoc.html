<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>API Reference - RFD40 / RFD90 IOT developer guide</title>
  <link href="https://fonts.googleapis.com/css?family=Inter:400,600,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/redoc-zebra.css?v=14" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: #fff; display: flex; height: 100vh; overflow: hidden; margin: 0; }
    #tree-sidebar {
      width: 260px; min-width: 260px; height: 100vh; overflow-y: auto;
      background: #fff; border-right: 1px solid #e5e7eb; padding: 8px 0;
    }
    #tree-sidebar .grp-hdr {
      font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
      color: #555; padding: 14px 16px 6px; cursor: pointer; user-select: none;
      display: flex; align-items: center;
    }
    #tree-sidebar .grp-hdr:hover { color: #0073bb; }
    #tree-sidebar .tri { display: inline-block; font-size: 10px; margin-right: 6px; transition: transform 0.15s; }
    #tree-sidebar .grp-hdr.open .tri { transform: rotate(90deg); }
    #tree-sidebar .grp-body { overflow: hidden; }
    #tree-sidebar .grp-body.collapsed { display: none; }
    #tree-sidebar .tag-name {
      padding: 6px 8px 6px 28px; cursor: pointer; color: #333; font-weight: 600; font-size: 13px;
    }
    #tree-sidebar .tag-name:hover { color: #0073bb; background: #f2f3f3; }
    #tree-sidebar .op-link {
      display: block; padding: 3px 8px 3px 44px; color: #666; text-decoration: none;
      cursor: pointer; font-size: 12px;
    }
    #tree-sidebar .op-link:hover { color: #0073bb; background: #f2f3f3; }
    rapi-doc { flex: 1; min-width: 0; height: 100vh; }
    rapi-doc::part(section-operation-summary) { font-size: 1.1rem; }
  </style>
</head>
<body>
  <nav id="tree-sidebar"></nav>
  <rapi-doc
    spec-url="openapi.yaml?v=29"
    render-style="read"
    show-header="false"
    show-side-nav="true"
    nav-bg-color="#ffffff"
    nav-text-color="#333333"
    nav-hover-bg-color="#f2f3f3"
    nav-hover-text-color="#0073bb"
    nav-accent-color="#0073bb"
    primary-color="#2563eb"
    bg-color="#ffffff"
    text-color="#333333"
    header-color="#1e293b"
    font-size="regular"
    regular-font="Inter, Segoe UI, system-ui, sans-serif"
    mono-font="Consolas, Monaco, monospace"
    schema-style="table"
    schema-expand-level="1"
    default-schema-tab="example"
    show-method-in-nav-bar="false"
    use-path-in-nav-bar="false"
    allow-try="false"
    allow-server-selection="false"
    allow-authentication="false"
  >
  </rapi-doc>

  <script type="module" src="https://unpkg.com/rapidoc@9.3.4/dist/rapidoc-min.js"></script>
  <script>
  (function() {
    /* After RapiDoc loads, hide HTTP method badges (POST/GET) since this is MQTT */
    function hideHttpMethods() {
      var rd = document.querySelector('rapi-doc');
      if (!rd || !rd.shadowRoot) return;
      var style = rd.shadowRoot.querySelector('style[data-mqtt-hide]');
      if (!style) {
        style = document.createElement('style');
        style.setAttribute('data-mqtt-hide', '1');
        style.textContent = [
          /* Hide HTTP method badges */
          '.m-btn.primary { display: none !important; }',
          '.method-fg { display: none !important; }',
          '.req-res-title .method { display: none !important; }',
          '.endpoint-head .method { display: none !important; }',
          '.nav-bar-tag .method { display: none !important; }',
          '.path { display: none !important; }',
          /* Compact request/response body examples */
          'textarea { min-height: 40px !important; max-height: 180px !important; height: auto !important; resize: vertical !important; font-size: 13px !important; padding: 8px !important; }',
          'pre { max-height: 250px !important; overflow: auto !important; padding: 8px 12px !important; font-size: 13px !important; }',
          '.tab-content { padding: 0 !important; }',
          '.tab-panels { padding: 0 !important; }',
          '.table-title { padding: 6px 0 !important; }',
        ].join('\n');
        rd.shadowRoot.appendChild(style);
      }
    }
    /* Poll for initial setup */
    var attempts = 0;
    var poll = setInterval(function() {
      hideHttpMethods();
      processAllBlocks();
      if (++attempts > 30) clearInterval(poll);
    }, 500);

    /* Process all pre and textarea blocks: add copy, resize.
       Recursively walks shadow roots since RapiDoc nests components. */
    function processAllBlocks() {
      var rd = document.querySelector('rapi-doc');
      if (!rd) return;
      walkShadowRoots(rd);
    }

    function walkShadowRoots(node) {
      if (node.shadowRoot) {
        addCopyToElement(node.shadowRoot);
        var children = node.shadowRoot.querySelectorAll('*');
        for (var c = 0; c < children.length; c++) {
          if (children[c].shadowRoot) walkShadowRoots(children[c]);
        }
      }
      /* Also check child elements in case they have shadow roots */
      var kids = node.querySelectorAll('*');
      for (var k = 0; k < kids.length; k++) {
        if (kids[k].shadowRoot) walkShadowRoots(kids[k]);
      }
    }

    function addCopyToElement(root) {
      /* Inject a style tag into this shadow root to force pre background */
      if (!root.querySelector('style[data-copy-style]')) {
        var style = document.createElement('style');
        style.setAttribute('data-copy-style', '1');
        style.textContent = 'pre { background: #f6f8fa !important; background-color: #f6f8fa !important; }';
        if (root.appendChild) root.appendChild(style);
      }
      /* <pre> blocks (response examples) */
      var pres = root.querySelectorAll('pre');
      for (var i = 0; i < pres.length; i++) {
        var pre = pres[i];
        if (pre.getAttribute('data-copy-added')) continue;
        pre.setAttribute('data-copy-added', '1');
        /* Overwrite the entire inline style to force grey background */
        var existingStyle = pre.getAttribute('style') || '';
        pre.setAttribute('style', existingStyle.replace(/background[^;]*;?/gi, '') + ';position:relative !important;background:#f6f8fa !important;background-color:#f6f8fa !important;');
        var btn = document.createElement('button');
        btn.textContent = 'Copy';
        btn.setAttribute('style', 'position:absolute !important;top:4px !important;right:4px !important;padding:3px 10px !important;font-size:11px !important;cursor:pointer !important;background:#3b82f6 !important;border:1px solid #2563eb !important;border-radius:4px !important;color:#fff !important;z-index:10 !important;');
        btn.onclick = (function(el, b) {
          return function() {
            var t = el.textContent.replace('Copy','').replace('Copied!','').trim();
            navigator.clipboard.writeText(t);
            b.textContent = 'Copied!';
            setTimeout(function(){ b.textContent = 'Copy'; }, 1500);
          };
        })(pre, btn);
        pre.appendChild(btn);
      }
      /* <textarea> blocks (request body examples) — replace with read-only <pre> */
      var tas = root.querySelectorAll('textarea');
      for (var j = 0; j < tas.length; j++) {
        var ta = tas[j];
        if (ta.getAttribute('data-copy-added')) continue;
        ta.setAttribute('data-copy-added', '1');
        var val = ta.value || ta.textContent || '';
        /* Create a <pre> to replace the textarea visually */
        var fakePre = document.createElement('pre');
        fakePre.textContent = val;
        fakePre.style.cssText = 'position:relative;background:#f6f8fa;border:1px solid #e2e8f0;border-radius:6px;padding:12px 50px 12px 16px;font-family:Consolas,Monaco,monospace;font-size:13px;white-space:pre-wrap;word-break:break-word;color:#333;line-height:1.5;margin:0;overflow:auto;max-height:250px;';
        fakePre.setAttribute('data-copy-added','1');
        /* Copy button inside the pre */
        var btn2 = document.createElement('button');
        btn2.textContent = 'Copy';
        btn2.setAttribute('style', 'position:absolute !important;top:4px !important;right:4px !important;padding:3px 10px !important;font-size:11px !important;cursor:pointer !important;background:#3b82f6 !important;border:1px solid #2563eb !important;border-radius:4px !important;color:#fff !important;z-index:10 !important;');
        btn2.onclick = (function(text, button) {
          return function() {
            navigator.clipboard.writeText(text);
            button.textContent = 'Copied!';
            setTimeout(function(){ button.textContent = 'Copy'; }, 1500);
          };
        })(val, btn2);
        fakePre.appendChild(btn2);
        /* Hide textarea and insert pre in its place */
        ta.style.display = 'none';
        ta.parentElement.insertBefore(fakePre, ta);
      }
    }

    /* MutationObserver: catch lazily rendered content (operations render on scroll) */
    function startObserver() {
      var rd = document.querySelector('rapi-doc');
      if (!rd || !rd.shadowRoot) {
        setTimeout(startObserver, 300);
        return;
      }
      var observer = new MutationObserver(function() {
        hideHttpMethods();
        processAllBlocks();
      });
      observer.observe(rd.shadowRoot, { childList: true, subtree: true });
      /* Also observe nested shadow roots */
      var all = rd.shadowRoot.querySelectorAll('*');
      for (var i = 0; i < all.length; i++) {
        if (all[i].shadowRoot) {
          observer.observe(all[i].shadowRoot, { childList: true, subtree: true });
        }
      }
    }
    startObserver();
  })();
  </script>

  <script>
  /* ── Collapsible x-tagGroups tree sidebar ──
     Strategy: Build sidebar OUTSIDE rapi-doc (in regular DOM) so Lit re-renders
     cannot touch it. Keep show-side-nav="true" so hidden nav elements exist in
     shadow DOM for programmatic click-based navigation. Inject a tiny CSS rule
     into shadow root to hide the native nav panel. */
  (function() {
    var TREE = [
      { group: 'MANAGEMENT', tags: [
        { name: 'Device Status', ops: ['get_status', 'get_version', 'get_current_region'] },
        { name: 'Device Configuration', ops: ['get_config', 'set_config'] },
        { name: 'Network Configuration', ops: ['get_wifi', 'set_wifi', 'delete_wifi_profile', 'get_eth'] },
        { name: 'MQTT Endpoint Configuration', ops: ['config_endpoint', 'get_endpoint_config'] },
        { name: 'Certificate Management', ops: ['install_certificate', 'delete_certificate', 'get_installed_certificate'] },
        { name: 'System Operations', ops: ['reboot', 'set_os'] }
      ]},
      { group: 'CONTROL', tags: [
        { name: 'Inventory Control', ops: ['control_operation'] },
        { name: 'Operating Mode', ops: ['get_operating_mode', 'set_operating_mode'] },
        { name: 'Tag Filtering', ops: ['get_post_filter', 'set_post_filter'] }
      ]},
      { group: 'EVENTS', tags: [
        { name: 'Device Health', ops: ['heartBeatEVT'] },
        { name: 'Alerts', ops: ['alerts', 'alert_short'] },
        { name: 'Exceptions', ops: ['exceptionEVT'] },
        { name: 'MQTT Connectivity', ops: ['mqttConnEVT'] },
        { name: 'Event Configuration', ops: ['config_events'] }
      ]},
      { group: 'DATA', tags: [
        { name: 'Tag Data Event', ops: ['dataEVT'] }
      ]}
    ];

    /* ── Build the sidebar in regular DOM (immune to Lit) ── */
    var sidebar = document.getElementById('tree-sidebar');
    for (var gi = 0; gi < TREE.length; gi++) {
      var g = TREE[gi];
      var hdr = document.createElement('div');
      hdr.className = 'grp-hdr open';
      hdr.innerHTML = '<span class="tri">\u25B6</span>' + g.group;
      var body = document.createElement('div');
      body.className = 'grp-body';
      (function(h, b) {
        h.addEventListener('click', function() { h.classList.toggle('open'); b.classList.toggle('collapsed'); });
      })(hdr, body);

      for (var ti = 0; ti < g.tags.length; ti++) {
        var tag = g.tags[ti];
        var tagDiv = document.createElement('div');
        tagDiv.className = 'tag-name';
        tagDiv.textContent = tag.name;
        (function(tName) {
          tagDiv.addEventListener('click', function() { navTo(tName, null); });
        })(tag.name);
        body.appendChild(tagDiv);

        for (var oi = 0; oi < tag.ops.length; oi++) {
          var opDiv = document.createElement('div');
          opDiv.className = 'op-link';
          opDiv.textContent = tag.ops[oi];
          (function(opName, tName) {
            opDiv.addEventListener('click', function() { navTo(tName, opName); });
          })(tag.ops[oi], tag.name);
          body.appendChild(opDiv);
        }
      }
      sidebar.appendChild(hdr);
      sidebar.appendChild(body);
    }

    /* ── Hide native RapiDoc nav panel (keep elements for click navigation) ── */
    function hideNativeNav() {
      var rd = document.querySelector('rapi-doc');
      if (!rd || !rd.shadowRoot) { setTimeout(hideNativeNav, 300); return; }
      var sr = rd.shadowRoot;
      if (!sr.querySelector('style[data-hide-nav]')) {
        var css = document.createElement('style');
        css.setAttribute('data-hide-nav', '1');
        css.textContent = '.nav-bar { display:none !important; }';
        sr.appendChild(css);
      }
    }
    hideNativeNav();
    /* Re-inject if Lit ever wipes the style */
    setInterval(hideNativeNav, 3000);

    /* ── Navigate by clicking hidden nav elements in shadow DOM ── */
    function navTo(tagName, opName) {
      var rd = document.querySelector('rapi-doc');
      if (!rd || !rd.shadowRoot) return;
      var sr = rd.shadowRoot;

      if (opName) {
        /* Find the hidden .nav-bar-path whose text matches the operation */
        var paths = sr.querySelectorAll('.nav-bar-path');
        for (var i = 0; i < paths.length; i++) {
          if (paths[i].textContent.trim().indexOf(opName) >= 0) {
            paths[i].click();
            return;
          }
        }
        /* Fallback: scroll to any element whose ID contains the operation name */
        var el = sr.querySelector('[id*="' + opName + '"]');
        if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); return; }
      }
      if (tagName) {
        var tags = sr.querySelectorAll('.nav-bar-tag');
        for (var j = 0; j < tags.length; j++) {
          if (tags[j].textContent.trim().indexOf(tagName) >= 0) {
            tags[j].click();
            return;
          }
        }
      }
    }
  })();
  </script>
</body>
</html>
