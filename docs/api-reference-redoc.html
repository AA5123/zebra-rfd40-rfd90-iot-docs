<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>API Reference - RFD40 / RFD90 API reference document</title>
  <link href="https://fonts.googleapis.com/css?family=Inter:400,600,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/redoc-zebra.css?v=15" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: #fff; }
    rapi-doc { width: 100%; height: 100%; }
    rapi-doc::part(section-endpoint-body-title) {
      font-size: 32px !important;
      font-weight: 700 !important;
      color: #003d6b !important;
      letter-spacing: 0.3px !important;
      padding-bottom: 10px !important;
      border-bottom: 3px solid #003d6b !important;
      display: block !important;
      margin-bottom: 12px !important;
    }
    rapi-doc::part(section-operation-summary) { font-size: 1.1rem; }
    rapi-doc::part(section-navbar-path) { padding-left: 16px !important; }
  </style>
</head>
<body>
  <rapi-doc
    spec-url="openapi.yaml?v=43"
    render-style="read"
    sort-endpoints-by="none"
    show-header="false"
    show-side-nav="true"
    nav-bg-color="#ffffff"
    nav-text-color="#333333"
    nav-hover-bg-color="#f2f3f3"
    nav-hover-text-color="#0073bb"
    nav-accent-color="#0073bb"
    primary-color="#2563eb"
    bg-color="#ffffff"
    text-color="#333333"
    header-color="#1e293b"
    font-size="large"
    regular-font="Inter, Segoe UI, system-ui, sans-serif"
    mono-font="Consolas, Monaco, monospace"
    schema-style="table"
    schema-expand-level="1"
    schema-description-expanded="true"
    default-schema-tab="schema"
    show-method-in-nav-bar="false"
    use-path-in-nav-bar="false"
    allow-try="false"
    allow-server-selection="false"
    allow-authentication="false"
  >
  </rapi-doc>

  <script type="module" src="js/rapidoc-min.js?v=4"></script>
  <script>
  (function() {
    var mqttSheet = new CSSStyleSheet();
    mqttSheet.replaceSync([
      '.m-btn.primary { display: none !important; }',
      '.method-fg { display: none !important; }',
      '.req-res-title .method { display: none !important; }',
      '.endpoint-head .method { display: none !important; }',
      '.nav-bar-tag .method { display: none !important; }',
      '.path { display: none !important; }',
      '.endpoint-url { display: none !important; }',
      '.only-large-font-size { display: none !important; }',
      '.nav-bar-path { padding-left: 16px !important; }',
      '.nav-bar-path .method-fg.small { display: none !important; width: 0 !important; margin: 0 !important; padding: 0 !important; }',

      /* ── Hide REQUEST BODY label, "default" status, standalone "Response" label, grey dividers, OBJECT badge ── */
      '.request-body-container > .req-res-title { display: none !important; }',
      '.resp-head { display: none !important; }',
      '.response-status { display: none !important; }',
      '.request-body-container .req-body-title { display: none !important; }',
      '.response-body-container .resp-body-title { display: none !important; }',
      '.divider { display: none !important; }',
      '.schema-object-type { display: none !important; }',
      '.object-type { display: none !important; }',
      '.schema-array-type { display: none !important; }',
      '.schema-multitype-selector { display: none !important; }',
      '.obj-type { display: none !important; }',

      /* ── Widen the main content area ── */
      '.main-content { max-width: 100% !important; width: 100% !important; padding: 0 24px !important; }',
      '.main-content > div, .main-content .operation-body { max-width: 100% !important; width: 100% !important; }',
      '.section-gap, .section-gap--read-mode { max-width: 100% !important; width: 100% !important; padding: 8px 24px !important; margin: 0 !important; }',
      '.main-content.read-mode { max-width: 100% !important; }',
      '.api-content { max-width: 100% !important; width: 100% !important; }',

      /* ── Tighten spacing between sections ── */
      '.endpoint-body { padding: 0 !important; margin: 0 !important; }',
      '.expanded-endpoint-body { padding: 8px 0 !important; }',
      '.tag-description { margin: 8px 0 !important; padding: 4px 0 !important; }',
      '.divider { margin: 8px 0 !important; }',
      '.req-res-info { margin-top: 12px !important; padding: 0 !important; }',
      '.request-body-container, .response-body-container { margin: 4px 0 !important; padding: 0 !important; }',
      '.m-markdown { margin: 0 !important; }',
      '.m-markdown p { margin: 0 0 8px 0 !important; }',
      '.m-markdown table { margin: 4px 0 8px 0 !important; }',
      '.m-markdown h2 { margin: 28px 0 16px 0 !important; font-weight: 700 !important; }',
      '.m-markdown h3 { margin: 24px 0 6px 0 !important; font-weight: 600 !important; }',

      /* ── Tables: Zebra navy headers + alternating rows ── */
      'table { border-collapse: collapse !important; width: 100% !important; border: 1.5px solid #003d6b !important; border-radius: 0 !important; }',
      'th { background: #003d6b !important; color: #fff !important; font-weight: 600 !important; font-size: 18px !important; letter-spacing: 0.3px !important; padding: 9px 12px !important; text-align: left !important; border-color: #002d50 !important; }',
      'td { padding: 8px 12px !important; vertical-align: top !important; font-size: 18px !important; border: 1px solid #8a94a6 !important; word-break: break-word !important; }',
      'tr:nth-child(odd) td { background: #ffffff !important; }',
      'tr:nth-child(even) td { background: #f7f9fb !important; }',

      /* ── Headings: navy accent ── */
      '.endpoint-body .summary .title, .summary .title, div.summary div.title, .only-large-font { font-size: 42px !important; font-weight: 800 !important; color: #003d6b !important; letter-spacing: 0.3px !important; border-bottom: 3px solid #003d6b !important; padding-bottom: 10px !important; display: block !important; margin-bottom: 16px !important; }',
      '.endpoint-head .descr { display: none !important; }',
      '.api-content h2, .section-gap h2, .section-gap--read-mode h2 { color: #003d6b !important; font-weight: 700 !important; border-bottom: 2px solid #003d6b !important; padding-bottom: 6px !important; margin-top: 28px !important; margin-bottom: 16px !important; font-size: 29px !important; }',
      '.api-content h3, .section-gap h3 { color: #003d6b !important; font-weight: 600 !important; margin-top: 24px !important; margin-bottom: 6px !important; font-size: 24px !important; }',

      /* ── Code blocks: match PDF styling ── */
      'pre { background: #f5f5f5 !important; border-left: 4px solid #003d6b !important; border-radius: 4px !important; padding: 12px 14px !important; font-size: 17px !important; line-height: 1.5 !important; max-height: 300px !important; overflow: auto !important; }',
      'code { background: #f4f4f4 !important; border-radius: 3px !important; padding: 1px 5px !important; font-size: 17px !important; color: #1a1a1a !important; }',
      'pre code { background: none !important; border: none !important; padding: 0 !important; font-size: 17px !important; }',

      /* ── Textareas (request bodies) ── */
      'textarea { min-height: 40px !important; max-height: 180px !important; height: auto !important; resize: vertical !important; font-size: 17px !important; padding: 8px !important; }',

      /* ── Tab & misc spacing ── */
      '.tab-content { padding: 0 !important; }',
      '.tab-panels { padding: 0 !important; }',
      '.table-title { padding: 6px 0 !important; }',

      /* ── Description text ── */
      '.m-markdown p, .m-markdown li { font-size: 19px !important; line-height: 1.6 !important; color: #1a1a1a !important; }',
      '.m-markdown strong { color: #1a1a1a !important; }',

      /* ── Schema table: widen and improve readability ── */
      ':host { --font-size-small: 19px !important; --font-size-regular: 19px !important; --font-size-mono: 17px !important; }',
      '.schema-table { width: 100% !important; max-width: 100% !important; }',
      '.schema-table .tr { display: grid !important; grid-template-columns: minmax(160px, 1fr) minmax(80px, auto) 3fr !important; width: 100% !important; }',
      '.schema-table .td { padding: 8px 12px !important; font-size: 19px !important; word-break: break-word !important; min-width: 0 !important; }',
      '.schema-table .key { min-width: 140px !important; font-size: 19px !important; }',
      '.schema-table .key-type { min-width: 70px !important; white-space: nowrap !important; font-size: 19px !important; }',
      '.schema-table .key-descr { min-width: 0 !important; flex: 1 !important; font-size: 19px !important; }',
      '.obj-descr { font-size: 19px !important; }',
      '.descr-text { font-size: 19px !important; }',
      'span.descr-text { font-size: 19px !important; }',
      '.schema-description { font-size: 19px !important; }',
      '.toolbar-btn { font-size: 17px !important; }',
      '.request-body-container *, .response-body-container * { --font-size-small: 19px !important; --font-size-regular: 19px !important; }',
      '.tree { width: 100% !important; max-width: 100% !important; overflow-x: auto !important; }',
      '.req-res-info { width: 100% !important; max-width: 100% !important; }',
      '.request-body-container, .response-body-container { width: 100% !important; max-width: 100% !important; }',
      '.schema-table-header { display: grid !important; grid-template-columns: minmax(160px, 1fr) minmax(80px, auto) 3fr !important; width: 100% !important; }',

      /* ── Note / blockquote callouts ── */
      '.m-markdown blockquote { background: #e8f0f8 !important; border-left: 4px solid #003d6b !important; border-radius: 4px !important; padding: 8px 12px !important; margin: 12px 0 8px !important; }',
    ].join('\n'));
    mqttSheet._isMqtt = true;

    function applyOverrides() {
      var rd = document.querySelector('rapi-doc');
      if (!rd || !rd.shadowRoot) return;
      injectSheet(rd.shadowRoot);
      /* Walk ALL nested shadow roots (api-request, api-response, schema-table, etc.) */
      walkAndInject(rd.shadowRoot);
    }

    function injectSheet(sr) {
      if (!sr || !sr.adoptedStyleSheets) return;
      var sheets = sr.adoptedStyleSheets;
      for (var i = 0; i < sheets.length; i++) {
        if (sheets[i]._isMqtt) return;
      }
      sr.adoptedStyleSheets = [].concat(Array.from(sheets), [mqttSheet]);
    }

    function walkAndInject(root) {
      if (!root) return;
      var els = root.querySelectorAll('*');
      for (var i = 0; i < els.length; i++) {
        if (els[i].shadowRoot) {
          injectSheet(els[i].shadowRoot);
          walkAndInject(els[i].shadowRoot);
        }
      }
    }
    /* Inject MANAGEMENT / CONTROL / EVENTS / DATA group headers into sidebar nav */
    function injectGroupHeaders(sr) {
      if (!sr) return;
      var existing = sr.querySelectorAll('[data-tag-group-header]');
      if (existing.length >= 4) return;
      for (var e = 0; e < existing.length; e++) existing[e].remove();
      var groups = [
        { name: 'MANAGEMENT', first: 'Device Status' },
        { name: 'CONTROL', first: 'Inventory Control' },
        { name: 'EVENTS', first: 'Device Health' },
        { name: 'DATA', first: 'Tag Data Event' }
      ];
      var firstMap = {};
      for (var g = 0; g < groups.length; g++) firstMap[groups[g].first] = groups[g].name;
      var navTags = sr.querySelectorAll('.nav-bar-tag');
      if (navTags.length === 0) return;
      for (var i = 0; i < navTags.length; i++) {
        var tagText = navTags[i].textContent.trim();
        if (firstMap[tagText]) {
          var hdr = document.createElement('div');
          hdr.setAttribute('data-tag-group-header', '1');
          hdr.textContent = firstMap[tagText];
          var isFirst = (tagText === 'Device Status');
          hdr.style.cssText = 'font-size:18px;font-weight:800;color:#003d6b;text-transform:uppercase;letter-spacing:2px;padding:' + (isFirst ? '10px' : '18px') + ' 16px 10px;' + (isFirst ? '' : 'margin-top:8px;border-top:2px solid #003d6b;');
          navTags[i].parentElement.insertBefore(hdr, navTags[i]);
        }
      }
    }
    /* Poll for initial setup */
    var attempts = 0;
    var poll = setInterval(function() {
      applyOverrides();
      processAllBlocks();
      var rd = document.querySelector('rapi-doc');
      if (rd && rd.shadowRoot) {
        styleHeadings(rd.shadowRoot);
        injectGroupHeaders(rd.shadowRoot);
      }
      if (++attempts > 200) clearInterval(poll);
    }, 500);

    /* Process all pre and textarea blocks: add copy, resize.
       Recursively walks shadow roots since RapiDoc nests components. */
    function processAllBlocks() {
      var rd = document.querySelector('rapi-doc');
      if (!rd) return;
      walkShadowRoots(rd);
    }

    function walkShadowRoots(node) {
      if (node.shadowRoot) {
        addCopyToElement(node.shadowRoot);
        var children = node.shadowRoot.querySelectorAll('*');
        for (var c = 0; c < children.length; c++) {
          if (children[c].shadowRoot) walkShadowRoots(children[c]);
        }
      }
      /* Also check child elements in case they have shadow roots */
      var kids = node.querySelectorAll('*');
      for (var k = 0; k < kids.length; k++) {
        if (kids[k].shadowRoot) walkShadowRoots(kids[k]);
      }
    }

    function addCopyToElement(root) {
      /* Hide OBJECT/ARRAY type badges via JS — check all elements */
      var allEls = root.querySelectorAll('*');
      for (var s = 0; s < allEls.length; s++) {
        var el = allEls[s];
        if (el.getAttribute('data-obj-hidden')) continue;
        var t = (el.textContent || '').trim();
        /* Match standalone OBJECT or ARRAY text (may have whitespace) */
        if (/^(OBJECT|ARRAY|object|array|default|Response)$/.test(t)) {
          el.setAttribute('data-obj-hidden', '1');
          el.style.display = 'none';
        }
      }
      /* Inject a style tag into this shadow root to force pre background */
      if (!root.querySelector('style[data-copy-style]')) {
        var style = document.createElement('style');
        style.setAttribute('data-copy-style', '1');
        style.textContent = 'pre { background: #f6f8fa !important; background-color: #f6f8fa !important; }';
        if (root.appendChild) root.appendChild(style);
      }
      /* Rename REQUEST / RESPONSE headers to MQTT-friendly labels */
      var reqResTitles = root.querySelectorAll('.req-res-title');
      for (var r = 0; r < reqResTitles.length; r++) {
        if (reqResTitles[r].getAttribute('data-mqtt-styled')) continue;
        reqResTitles[r].setAttribute('data-mqtt-styled', '1');
        var txt = reqResTitles[r].textContent.trim().toUpperCase();
        var topicPrefix = '{tenantId}/MGMT/clients/';
        if (txt.indexOf('REQUEST') !== -1) {
          reqResTitles[r].innerHTML = '<div style="font-size:29px;font-weight:700;color:#003d6b;border-bottom:2px solid #003d6b;padding-bottom:6px;margin-top:32px;margin-bottom:8px;">Command Payload</div>' +
            '<div style="font-size:17px;color:#333;margin:2px 0;"><b>Publish to:</b> <code style="background:#f4f4f4;padding:1px 5px;border-radius:3px;">' + topicPrefix + 'cmnd/{deviceSerial}</code></div>';
        } else if (txt.indexOf('RESPONSE') !== -1) {
          reqResTitles[r].innerHTML = '<div style="font-size:29px;font-weight:700;color:#003d6b;border-bottom:2px solid #003d6b;padding-bottom:6px;margin-top:32px;margin-bottom:8px;">Response Payload</div>' +
            '<div style="font-size:17px;color:#333;margin:2px 0;"><b>Published on:</b> <code style="background:#f4f4f4;padding:1px 5px;border-radius:3px;">' + topicPrefix + 'resp/{deviceSerial}</code></div>';
        }
      }
      /* Style enum "Allowed:" values as bordered code badges */
      var boldTexts = root.querySelectorAll('.bold-text');
      for (var a = 0; a < boldTexts.length; a++) {
        var bt = boldTexts[a];
        if (bt.getAttribute('data-enum-styled')) continue;
        var label = bt.textContent.trim();
        if (label !== 'Allowed:' && label !== 'Value:') continue;
        bt.setAttribute('data-enum-styled', '1');
        var parentDiv = bt.parentElement;
        if (!parentDiv) continue;
        /* Collect text nodes after the bold-text span */
        var valText = '';
        var sibling = bt.nextSibling;
        while (sibling) {
          if (sibling.nodeType === 3) valText += sibling.textContent;
          sibling = sibling.nextSibling;
        }
        valText = valText.trim();
        if (!valText) continue;
        /* Split on thick pipe U+2503 or regular pipe */
        var vals = valText.split(/[|\u2503]/).map(function(v){ return v.trim(); }).filter(function(v){ return v !== ''; });
        var badges = vals.map(function(v) {
          return '<span style="display:inline-block;background:#fff;border:1px solid #bbb;border-radius:3px;padding:2px 10px;margin:2px 4px 2px 0;font-family:Consolas,Monaco,monospace;font-size:16px;color:#333;">' + v + '</span>';
        }).join('');
        parentDiv.innerHTML = '<span style="font-weight:600;color:#555;font-size:16px;">Enum:</span> ' + badges;
      }
      /* <pre> blocks (response examples) */
      var pres = root.querySelectorAll('pre');
      for (var i = 0; i < pres.length; i++) {
        var pre = pres[i];
        if (pre.getAttribute('data-copy-added')) continue;
        pre.setAttribute('data-copy-added', '1');
        /* Overwrite the entire inline style to force grey background */
        var existingStyle = pre.getAttribute('style') || '';
        pre.setAttribute('style', existingStyle.replace(/background[^;]*;?/gi, '') + ';position:relative !important;background:#f6f8fa !important;background-color:#f6f8fa !important;');
        var btn = document.createElement('button');
        btn.textContent = 'Copy';
        btn.setAttribute('style', 'position:absolute !important;top:4px !important;right:4px !important;padding:3px 10px !important;font-size:11px !important;cursor:pointer !important;background:#3b82f6 !important;border:1px solid #2563eb !important;border-radius:4px !important;color:#fff !important;z-index:10 !important;');
        btn.onclick = (function(el, b) {
          return function() {
            var t = el.textContent.replace('Copy','').replace('Copied!','').trim();
            navigator.clipboard.writeText(t);
            b.textContent = 'Copied!';
            setTimeout(function(){ b.textContent = 'Copy'; }, 1500);
          };
        })(pre, btn);
        pre.appendChild(btn);
      }
      /* <textarea> blocks (request body examples) — replace with read-only <pre> */
      var tas = root.querySelectorAll('textarea');
      for (var j = 0; j < tas.length; j++) {
        var ta = tas[j];
        if (ta.getAttribute('data-copy-added')) continue;
        ta.setAttribute('data-copy-added', '1');
        var val = ta.value || ta.textContent || '';
        /* Create a <pre> to replace the textarea visually */
        var fakePre = document.createElement('pre');
        fakePre.textContent = val;
        fakePre.style.cssText = 'position:relative;background:#f6f8fa;border:1px solid #e2e8f0;border-radius:6px;padding:12px 50px 12px 16px;font-family:Consolas,Monaco,monospace;font-size:16px;white-space:pre-wrap;word-break:break-word;color:#333;line-height:1.5;margin:0;overflow:auto;max-height:250px;';
        fakePre.setAttribute('data-copy-added','1');
        /* Copy button inside the pre */
        var btn2 = document.createElement('button');
        btn2.textContent = 'Copy';
        btn2.setAttribute('style', 'position:absolute !important;top:4px !important;right:4px !important;padding:3px 10px !important;font-size:11px !important;cursor:pointer !important;background:#3b82f6 !important;border:1px solid #2563eb !important;border-radius:4px !important;color:#fff !important;z-index:10 !important;');
        btn2.onclick = (function(text, button) {
          return function() {
            navigator.clipboard.writeText(text);
            button.textContent = 'Copied!';
            setTimeout(function(){ button.textContent = 'Copy'; }, 1500);
          };
        })(val, btn2);
        fakePre.appendChild(btn2);
        /* Hide textarea and insert pre in its place */
        ta.style.display = 'none';
        ta.parentElement.insertBefore(fakePre, ta);
      }
    }

    /* Style operation headings (.summary .title) directly via DOM */
    /* Breadcrumb mapping: operation -> { group, tag } */
    var breadcrumbMap = {
      'get_status': { group: 'Management', tag: 'Device Status' },
      'get_version': { group: 'Management', tag: 'Device Status' },
      'get_current_region': { group: 'Management', tag: 'Device Status' },
      'get_config': { group: 'Management', tag: 'Device Configuration' },
      'set_config': { group: 'Management', tag: 'Device Configuration' },
      'get_wifi': { group: 'Management', tag: 'Network Configuration' },
      'set_wifi': { group: 'Management', tag: 'Network Configuration' },
      'delete_wifi_profile': { group: 'Management', tag: 'Network Configuration' },
      'get_eth': { group: 'Management', tag: 'Network Configuration' },
      'config_endpoint': { group: 'Management', tag: 'MQTT Endpoint Configuration' },
      'get_endpoint_config': { group: 'Management', tag: 'MQTT Endpoint Configuration' },
      'install_certificate': { group: 'Management', tag: 'Certificate Management' },
      'delete_certificate': { group: 'Management', tag: 'Certificate Management' },
      'get_installed_certificate': { group: 'Management', tag: 'Certificate Management' },
      'reboot': { group: 'Management', tag: 'System Operations' },
      'set_os': { group: 'Management', tag: 'System Operations' },
      'control_operation': { group: 'Control', tag: 'Inventory Control' },
      'set_operating_mode': { group: 'Control', tag: 'Operating Mode' },
      'get_operating_mode': { group: 'Control', tag: 'Operating Mode' },
      'set_post_filter': { group: 'Control', tag: 'Tag Filtering' },
      'get_post_filter': { group: 'Control', tag: 'Tag Filtering' },
      'heartBeatEVT': { group: 'Events', tag: 'Device Health' },
      'alerts': { group: 'Events', tag: 'Alerts' },
      'alert_short': { group: 'Events', tag: 'Alerts' },
      'exceptionEVT': { group: 'Events', tag: 'Exceptions' },
      'mqttConnEVT': { group: 'Events', tag: 'MQTT Connectivity' },
      'config_events': { group: 'Events', tag: 'Event Configuration' },
      'dataEVT': { group: 'Data', tag: 'Tag Data Event' }
    };
    function styleHeadings(root) {
      if (!root) return;
      /* Target multiple possible selectors for operation title */
      var selectors = '.summary .title, .endpoint-body .summary .title, h1, .tag--name, [class*="title"][class*="summary"]';
      var titles = root.querySelectorAll(selectors);
      for (var t = 0; t < titles.length; t++) {
        if (titles[t].getAttribute('data-styled')) continue;
        var txt = (titles[t].textContent || '').trim();
        /* Only style operation-name-like elements (skip generic headings) */
        if (!txt || txt.length > 80) continue;
        titles[t].setAttribute('data-styled', '1');
        titles[t].style.cssText = 'font-size:42px!important;font-weight:800!important;color:#003d6b!important;letter-spacing:0.3px!important;border-bottom:3px solid #003d6b!important;padding-bottom:10px!important;display:block!important;margin-bottom:4px!important;';
        /* Add breadcrumb below title */
        var bc = breadcrumbMap[txt];
        if (bc && !titles[t].parentElement.querySelector('[data-breadcrumb]')) {
          var crumb = document.createElement('div');
          crumb.setAttribute('data-breadcrumb', '1');
          crumb.style.cssText = 'font-size:14px;color:#666;margin-bottom:16px;font-weight:400;';
          crumb.innerHTML = '<span style="color:#888;">' + bc.group + '</span> <span style="color:#aaa;margin:0 4px;">›</span> <span style="color:#888;">' + bc.tag + '</span> <span style="color:#aaa;margin:0 4px;">›</span> <span style="color:#003d6b;font-weight:600;">' + txt + '</span>';
          titles[t].parentElement.insertBefore(crumb, titles[t].nextSibling);
        }
      }
    }

    /* MutationObserver: catch lazily rendered content (operations render on scroll) */
    function startObserver() {
      var rd = document.querySelector('rapi-doc');
      if (!rd || !rd.shadowRoot) {
        setTimeout(startObserver, 300);
        return;
      }
      var observer = new MutationObserver(function() {
        applyOverrides();
        processAllBlocks();
        styleHeadings(rd.shadowRoot);
        injectGroupHeaders(rd.shadowRoot);
      });
      observer.observe(rd.shadowRoot, { childList: true, subtree: true });
      /* Also observe nested shadow roots */
      var all = rd.shadowRoot.querySelectorAll('*');
      for (var i = 0; i < all.length; i++) {
        if (all[i].shadowRoot) {
          observer.observe(all[i].shadowRoot, { childList: true, subtree: true });
        }
      }
      /* Initial pass */
      styleHeadings(rd.shadowRoot);
      injectGroupHeaders(rd.shadowRoot);
    }
    startObserver();
  })();
  </script>
