<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>API Reference - RFD40 / RFD90 IOT developer guide</title>
  <link href="https://fonts.googleapis.com/css?family=Inter:400,600,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/redoc-zebra.css?v=14" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: #fff; }
    rapi-doc { width: 100%; height: 100%; }
    rapi-doc::part(section-operation-summary) { font-size: 1.1rem; }
  </style>
</head>
<body>
  <rapi-doc
    spec-url="openapi.yaml?v=29"
    render-style="read"
    show-header="false"
    show-side-nav="true"
    nav-bg-color="#ffffff"
    nav-text-color="#333333"
    nav-hover-bg-color="#f2f3f3"
    nav-hover-text-color="#0073bb"
    nav-accent-color="#0073bb"
    primary-color="#2563eb"
    bg-color="#ffffff"
    text-color="#333333"
    header-color="#1e293b"
    font-size="regular"
    regular-font="Inter, Segoe UI, system-ui, sans-serif"
    mono-font="Consolas, Monaco, monospace"
    schema-style="table"
    schema-expand-level="1"
    default-schema-tab="example"
    show-method-in-nav-bar="false"
    use-path-in-nav-bar="false"
    allow-try="false"
    allow-server-selection="false"
    allow-authentication="false"
  >
  </rapi-doc>

  <script type="module" src="https://unpkg.com/rapidoc@9.3.4/dist/rapidoc-min.js"></script>
  <script>
  (function() {
    /* After RapiDoc loads, hide HTTP method badges (POST/GET) since this is MQTT */
    function hideHttpMethods() {
      var rd = document.querySelector('rapi-doc');
      if (!rd || !rd.shadowRoot) return;
      var style = rd.shadowRoot.querySelector('style[data-mqtt-hide]');
      if (!style) {
        style = document.createElement('style');
        style.setAttribute('data-mqtt-hide', '1');
        style.textContent = [
          /* Hide HTTP method badges */
          '.m-btn.primary { display: none !important; }',
          '.method-fg { display: none !important; }',
          '.req-res-title .method { display: none !important; }',
          '.endpoint-head .method { display: none !important; }',
          '.nav-bar-tag .method { display: none !important; }',
          '.path { display: none !important; }',
          /* Compact request/response body examples */
          'textarea { min-height: 40px !important; max-height: 180px !important; height: auto !important; resize: vertical !important; font-size: 13px !important; padding: 8px !important; }',
          'pre { max-height: 250px !important; overflow: auto !important; padding: 8px 12px !important; font-size: 13px !important; }',
          '.tab-content { padding: 0 !important; }',
          '.tab-panels { padding: 0 !important; }',
          '.table-title { padding: 6px 0 !important; }',
        ].join('\n');
        rd.shadowRoot.appendChild(style);
      }
    }
    /* Poll for initial setup */
    var attempts = 0;
    var poll = setInterval(function() {
      hideHttpMethods();
      processAllBlocks();
      if (++attempts > 30) clearInterval(poll);
    }, 500);

    /* Process all pre and textarea blocks: add copy, resize.
       Recursively walks shadow roots since RapiDoc nests components. */
    function processAllBlocks() {
      var rd = document.querySelector('rapi-doc');
      if (!rd) return;
      walkShadowRoots(rd);
    }

    function walkShadowRoots(node) {
      if (node.shadowRoot) {
        addCopyToElement(node.shadowRoot);
        var children = node.shadowRoot.querySelectorAll('*');
        for (var c = 0; c < children.length; c++) {
          if (children[c].shadowRoot) walkShadowRoots(children[c]);
        }
      }
      /* Also check child elements in case they have shadow roots */
      var kids = node.querySelectorAll('*');
      for (var k = 0; k < kids.length; k++) {
        if (kids[k].shadowRoot) walkShadowRoots(kids[k]);
      }
    }

    function addCopyToElement(root) {
      /* Inject a style tag into this shadow root to force pre background */
      if (!root.querySelector('style[data-copy-style]')) {
        var style = document.createElement('style');
        style.setAttribute('data-copy-style', '1');
        style.textContent = 'pre { background: #f6f8fa !important; background-color: #f6f8fa !important; }';
        if (root.appendChild) root.appendChild(style);
      }
      /* <pre> blocks (response examples) */
      var pres = root.querySelectorAll('pre');
      for (var i = 0; i < pres.length; i++) {
        var pre = pres[i];
        if (pre.getAttribute('data-copy-added')) continue;
        pre.setAttribute('data-copy-added', '1');
        /* Overwrite the entire inline style to force grey background */
        var existingStyle = pre.getAttribute('style') || '';
        pre.setAttribute('style', existingStyle.replace(/background[^;]*;?/gi, '') + ';position:relative !important;background:#f6f8fa !important;background-color:#f6f8fa !important;');
        var btn = document.createElement('button');
        btn.textContent = 'Copy';
        btn.setAttribute('style', 'position:absolute !important;top:4px !important;right:4px !important;padding:3px 10px !important;font-size:11px !important;cursor:pointer !important;background:#3b82f6 !important;border:1px solid #2563eb !important;border-radius:4px !important;color:#fff !important;z-index:10 !important;');
        btn.onclick = (function(el, b) {
          return function() {
            var t = el.textContent.replace('Copy','').replace('Copied!','').trim();
            navigator.clipboard.writeText(t);
            b.textContent = 'Copied!';
            setTimeout(function(){ b.textContent = 'Copy'; }, 1500);
          };
        })(pre, btn);
        pre.appendChild(btn);
      }
      /* <textarea> blocks (request body examples) — replace with read-only <pre> */
      var tas = root.querySelectorAll('textarea');
      for (var j = 0; j < tas.length; j++) {
        var ta = tas[j];
        if (ta.getAttribute('data-copy-added')) continue;
        ta.setAttribute('data-copy-added', '1');
        var val = ta.value || ta.textContent || '';
        /* Create a <pre> to replace the textarea visually */
        var fakePre = document.createElement('pre');
        fakePre.textContent = val;
        fakePre.style.cssText = 'position:relative;background:#f6f8fa;border:1px solid #e2e8f0;border-radius:6px;padding:12px 50px 12px 16px;font-family:Consolas,Monaco,monospace;font-size:13px;white-space:pre-wrap;word-break:break-word;color:#333;line-height:1.5;margin:0;overflow:auto;max-height:250px;';
        fakePre.setAttribute('data-copy-added','1');
        /* Copy button inside the pre */
        var btn2 = document.createElement('button');
        btn2.textContent = 'Copy';
        btn2.setAttribute('style', 'position:absolute !important;top:4px !important;right:4px !important;padding:3px 10px !important;font-size:11px !important;cursor:pointer !important;background:#3b82f6 !important;border:1px solid #2563eb !important;border-radius:4px !important;color:#fff !important;z-index:10 !important;');
        btn2.onclick = (function(text, button) {
          return function() {
            navigator.clipboard.writeText(text);
            button.textContent = 'Copied!';
            setTimeout(function(){ button.textContent = 'Copy'; }, 1500);
          };
        })(val, btn2);
        fakePre.appendChild(btn2);
        /* Hide textarea and insert pre in its place */
        ta.style.display = 'none';
        ta.parentElement.insertBefore(fakePre, ta);
      }
    }

    /* MutationObserver: catch lazily rendered content (operations render on scroll) */
    function startObserver() {
      var rd = document.querySelector('rapi-doc');
      if (!rd || !rd.shadowRoot) {
        setTimeout(startObserver, 300);
        return;
      }
      var observer = new MutationObserver(function() {
        hideHttpMethods();
        processAllBlocks();
      });
      observer.observe(rd.shadowRoot, { childList: true, subtree: true });
      /* Also observe nested shadow roots */
      var all = rd.shadowRoot.querySelectorAll('*');
      for (var i = 0; i < all.length; i++) {
        if (all[i].shadowRoot) {
          observer.observe(all[i].shadowRoot, { childList: true, subtree: true });
        }
      }
    }
    startObserver();
  })();
  </script>

  <script>
  /* ── Collapsible x-tagGroups tree sidebar ──
     Strategy: Instead of moving Lit-managed DOM elements (which Lit undoes on re-render),
     we HIDE the original nav and BUILD our own nav clone outside Lit's control. */
  (function() {
    var TAG_GROUPS = [
      { name: 'Management', tags: ['Device Status','Device Configuration','Network Configuration','MQTT Endpoint Configuration','Certificate Management','System Operations'] },
      { name: 'Control', tags: ['Inventory Control','Operating Mode','Tag Filtering'] },
      { name: 'Events', tags: ['Device Health','Alerts','Exceptions','MQTT Connectivity','Event Configuration'] },
      { name: 'Data', tags: ['Tag Data Event'] }
    ];
    var EXPECTED_TAGS = 0;
    for (var _g = 0; _g < TAG_GROUPS.length; _g++) EXPECTED_TAGS += TAG_GROUPS[_g].tags.length;
    var applied = false;

    function buildTreeNav(sr) {
      if (applied) return;
      var navScroll = sr.querySelector('.nav-scroll');
      if (!navScroll) return;

      var sections = navScroll.querySelectorAll('.nav-bar-tag-and-paths');
      if (sections.length < EXPECTED_TAGS) return;

      /* Map tag name → its nav-bar-tag-and-paths element */
      var sectionByTag = {};
      for (var s = 0; s < sections.length; s++) {
        var sec = sections[s];
        var tagEl = sec.querySelector('.nav-bar-tag');
        if (!tagEl) continue;
        var innerDiv = tagEl.querySelector('div[style]') || tagEl.querySelector('div') || tagEl;
        var txt = innerDiv.textContent.trim();
        if (txt) sectionByTag[txt] = sec;
      }
      if (Object.keys(sectionByTag).length < EXPECTED_TAGS) return;

      /* Hide the OPERATIONS header via CSS */
      var css = sr.querySelector('style[data-tree-nav]');
      if (!css) {
        css = document.createElement('style');
        css.setAttribute('data-tree-nav', '1');
        css.textContent =
          '#link-operations-top { display:none !important; }' +
          '.custom-tree-nav .nav-group-header { font-size:11px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:#555; padding:14px 16px 6px; cursor:pointer; user-select:none; display:flex; align-items:center; }' +
          '.custom-tree-nav .nav-group-header:hover { color:#0073bb; }' +
          '.custom-tree-nav .tri { display:inline-block; font-size:10px; margin-right:6px; transition:transform 0.15s; }' +
          '.custom-tree-nav .nav-group-header.open .tri { transform:rotate(90deg); }' +
          '.custom-tree-nav .nav-group-body { overflow:hidden; }' +
          '.custom-tree-nav .nav-group-body.collapsed { display:none; }' +
          '.custom-tree-nav .tag-link { display:block; padding:6px 8px 6px 28px; color:var(--nav-text-color,#333); text-decoration:none; font-size:var(--font-size-small,13px); cursor:pointer; border-left:3px solid transparent; }' +
          '.custom-tree-nav .tag-link:hover { background:var(--nav-hover-bg-color,#f2f3f3); color:var(--nav-hover-text-color,#0073bb); }' +
          '.custom-tree-nav .tag-link.active { border-left-color:var(--nav-accent-color,#0073bb); color:var(--nav-accent-color,#0073bb); font-weight:600; }' +
          '.custom-tree-nav .op-link { display:block; padding:4px 8px 4px 44px; color:var(--nav-text-color,#333); text-decoration:none; font-size:var(--font-size-small,13px); cursor:pointer; }' +
          '.custom-tree-nav .op-link:hover { background:var(--nav-hover-bg-color,#f2f3f3); color:var(--nav-hover-text-color,#0073bb); }' +
          '.custom-tree-nav .tag-ops { }' +
          '.custom-tree-nav .tag-ops.collapsed { display:none; }' +
          /* Hide original tag sections but keep info/overview */
          '.nav-bar-tag-and-paths { display:none !important; }';
        sr.appendChild(css);
      }

      /* Build our own nav tree as a standalone div */
      var treeDiv = document.createElement('div');
      treeDiv.className = 'custom-tree-nav';

      for (var gi = 0; gi < TAG_GROUPS.length; gi++) {
        var group = TAG_GROUPS[gi];
        var header = document.createElement('div');
        header.className = 'nav-group-header open';
        header.innerHTML = '<span class="tri">\u25B6</span>' + group.name.toUpperCase();
        var body = document.createElement('div');
        body.className = 'nav-group-body';

        (function(h, b) {
          h.addEventListener('click', function(e) {
            e.stopPropagation();
            h.classList.toggle('open');
            b.classList.toggle('collapsed');
          });
        })(header, body);

        for (var ti = 0; ti < group.tags.length; ti++) {
          var tagName = group.tags[ti];
          var origSec = sectionByTag[tagName];
          if (!origSec) continue;

          /* Create tag link */
          var tagLink = document.createElement('a');
          tagLink.className = 'tag-link';
          tagLink.textContent = tagName;
          /* Get the tag's content-id for scrolling */
          var origTag = origSec.querySelector('.nav-bar-tag');
          var contentId = origTag ? origTag.getAttribute('data-content-id') || origTag.id || '' : '';
          tagLink.setAttribute('data-content-id', contentId);

          /* Create ops container */
          var opsDiv = document.createElement('div');
          opsDiv.className = 'tag-ops';

          /* Copy operation links */
          var ops = origSec.querySelectorAll('.nav-bar-path');
          for (var oi = 0; oi < ops.length; oi++) {
            var opEl = ops[oi];
            var opLink = document.createElement('a');
            opLink.className = 'op-link';
            /* Get the operation text (skip method badge) */
            var opSpan = opEl.querySelector('span');
            opLink.textContent = opSpan ? opSpan.textContent.trim() : opEl.textContent.trim();
            var opContentId = opEl.getAttribute('data-content-id') || '';
            opLink.setAttribute('data-content-id', opContentId);
            opsDiv.appendChild(opLink);
          }

          /* Toggle ops on tag click, also navigate */
          (function(tl, od, cid) {
            tl.addEventListener('click', function(e) {
              e.preventDefault();
              e.stopPropagation();
              /* Navigate to tag section */
              var rd = document.querySelector('rapi-doc');
              if (rd && cid) {
                rd.scrollToPath(cid);
                /* Also try dispatching navigation */
                var target = sr.querySelector('#link-' + cid);
                if (target) target.click();
              }
            });
          })(tagLink, opsDiv, contentId);

          /* Wire operation clicks */
          var opLinks = opsDiv.querySelectorAll('.op-link');
          for (var ol = 0; ol < opLinks.length; ol++) {
            (function(link) {
              link.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                var cid = link.getAttribute('data-content-id');
                if (cid) {
                  /* Click the original hidden nav element to trigger RapiDoc navigation */
                  var origPath = sr.querySelector('[data-content-id="' + cid + '"]');
                  if (origPath) origPath.click();
                }
              });
            })(opLinks[ol]);
          }

          body.appendChild(tagLink);
          body.appendChild(opsDiv);
        }

        treeDiv.appendChild(header);
        treeDiv.appendChild(body);
      }

      /* Insert our tree nav into the nav-scroll, after the overview section */
      var opsTop = navScroll.querySelector('#link-operations-top');
      if (opsTop) {
        navScroll.insertBefore(treeDiv, opsTop);
      } else {
        navScroll.appendChild(treeDiv);
      }

      applied = true;
    }

    /* Poll until RapiDoc renders all tags, then build tree once */
    function init() {
      var rd = document.querySelector('rapi-doc');
      if (!rd || !rd.shadowRoot) { setTimeout(init, 300); return; }
      var sr = rd.shadowRoot;

      var attempts = 0;
      var poll = setInterval(function() {
        if (applied || ++attempts > 200) { clearInterval(poll); return; }
        buildTreeNav(sr);
      }, 500);
    }
    init();
  })();
  </script>
</body>
</html>
