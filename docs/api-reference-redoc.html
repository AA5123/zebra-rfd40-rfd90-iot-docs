<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>API Reference - RFD40 / RFD90 IOT developer guide</title>
  <link href="https://fonts.googleapis.com/css?family=Inter:400,600,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/redoc-zebra.css?v=6" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: #fff; }
  </style>
</head>
<body>
  <div id="redoc-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/redoc@2.2.0/bundles/redoc.standalone.js"></script>
  <script>
  (function() {
    var el = document.getElementById('redoc-container');
    var methods = ['post', 'get', 'put', 'delete', 'patch', 'options', 'head'];

    function collectAll(root) {
      var list = [];
      function walk(r) {
        if (r.shadowRoot) walk(r.shadowRoot);
        list.push(r);
        for (var i = 0; i < r.children.length; i++) walk(r.children[i]);
      }
      walk(root);
      return list;
    }

    function isMethodText(text) {
      return methods.indexOf(String(text || '').trim().toLowerCase()) !== -1;
    }

    function hideMethodBadges() {
      if (!el) return;
      // Identify the sidebar (first child of Redoc wrapper) so we skip it
      var wrap = el.children[0];
      var sidebarEl = wrap && wrap.children.length > 0 ? wrap.children[0] : null;
      var all = collectAll(el);
      for (var i = 0; i < all.length; i++) {
        var node = all[i];
        if (node.nodeType !== 1) continue;
        // Never hide anything inside the Redoc sidebar/menu
        if (sidebarEl && sidebarEl.contains(node)) continue;
        var className = String(node.className || '').toLowerCase();
        var dataMethod = String(node.getAttribute && node.getAttribute('data-method') || '').toLowerCase();
        var txt = String(node.textContent || '').trim();
        if (isMethodText(node.textContent) || dataMethod || className.indexOf('http-verb') !== -1 || className.indexOf('method') !== -1) {
          node.style.setProperty('display', 'none', 'important');
          continue;
        }
        var looksResponseClass = className.indexOf('response') !== -1 || className.indexOf('status') !== -1 || className.indexOf('code') !== -1;
        var hasHttpCodeText = /(^|\W)[1-5][0-9]{2}(\W|$)/.test(txt);
        var hasHttpLabelText = /(^|\W)(?:success|ok|responses?)(\W|$)/i.test(txt);
        if (node.childElementCount === 0 && /default/i.test(txt)) {
          node.textContent = txt.replace(/default/gi, 'Response');
          txt = node.textContent;
        }
        if (looksResponseClass && (hasHttpCodeText || hasHttpLabelText)) {
          node.style.setProperty('display', 'none', 'important');
          continue;
        }
        if (node.childElementCount === 0 && /^(?:[1-5][0-9]{2}|success|ok|responses?)$/i.test(txt)) {
          var tag = String(node.tagName || '').toUpperCase();
          if (tag !== 'CODE' && tag !== 'PRE' && tag !== 'KBD') {
            node.style.setProperty('display', 'none', 'important');
          }
        }
      }
      if (typeof document.createTreeWalker === 'function') {
        function walkRoot(r) {
          if (r.shadowRoot) walkRoot(r.shadowRoot);
          var tw = document.createTreeWalker(r, NodeFilter.SHOW_TEXT, null, false);
          var t;
          while ((t = tw.nextNode())) {
            var raw = String(t.textContent || '').trim();
            if (!t.parentNode || t.parentNode.nodeType !== 1) continue;
            // Skip nodes inside the sidebar
            if (sidebarEl && sidebarEl.contains(t.parentNode)) continue;
            if (isMethodText(raw)) {
              t.parentNode.style.setProperty('display', 'none', 'important');
              continue;
            }
            if (/^(?:[1-5][0-9]{2}|success|ok|responses?)$/i.test(raw)) {
              var pTag = String(t.parentNode.tagName || '').toUpperCase();
              if (pTag !== 'CODE' && pTag !== 'PRE' && pTag !== 'KBD') {
                t.parentNode.style.setProperty('display', 'none', 'important');
              }
            }
            if (/default/i.test(raw)) {
              t.textContent = String(t.textContent || '').replace(/default/gi, 'Response');
            }
          }
          for (var k = 0; k < r.children.length; k++) walkRoot(r.children[k]);
        }
        walkRoot(el);
      }
    }

    var HIDE_VERB_CSS = '.http-verb,[class*="http-verb"],[class*="HttpVerb"],[data-method],[class*="Method"],[class*="method"],[class*="response-status"],[class*="ResponseStatus"],[class*="status-code"],[class*="StatusCode"],[class*="response-code"],[class*="ResponseCode"],[class*="http-status"],[class*="ResponseCodeBlock"]{display:none!important}';

    function injectShadowStyles(root) {
      if (!root) return;
      if (root.shadowRoot) {
        if (!root.shadowRoot.querySelector('style[data-mqtt-hide-verb]')) {
          var s = document.createElement('style');
          s.setAttribute('data-mqtt-hide-verb', '1');
          s.textContent = HIDE_VERB_CSS;
          root.shadowRoot.appendChild(s);
        }
        for (var i = 0; i < root.shadowRoot.children.length; i++) injectShadowStyles(root.shadowRoot.children[i]);
      }
      for (var i = 0; i < root.children.length; i++) injectShadowStyles(root.children[i]);
    }

    function runHide() {
      try { hideMethodBadges(); } catch(e) {}
      try { injectShadowStyles(el); } catch(e) {}
      try { styleSidebar(); } catch(e) {}
    }

    /* AWS-style tree sidebar — matches Amazon EC2 docs style exactly.
       Redoc DOM: <ul role="menu"> > <li role="menuitem" aria-expanded="true|false"> > <label class="-depthN [active]">
       depth 0 = tag groups (like "Amazon Machine Images")
       depth 1 = tags (like "AMI characteristics")  
       depth 2 = operations (like "Identify the AMI root volume type") */
    function styleSidebar() {
      if (document.getElementById('tree-sidebar-css')) return;
      var root = el.querySelector('[role="menu"]');
      if (!root) return;

      var css = [];

      /* ---- Reset: hide Redoc default SVG arrows & HTTP method badges ---- */
      css.push('[role="menu"] label svg { display:none!important; }');
      css.push('[role="menu"] .operation-type,[role="menu"] [class*="operation-badge"],[role="menu"] [class*="OperationBadge"]{ display:none!important; }');

      /* ---- Base: all menu items ---- */
      css.push('[role="menu"] li[role="menuitem"] { border:none!important; margin:0!important; padding:0!important; overflow:visible!important; }');
      css.push('[role="menu"] li[role="menuitem"] > label { display:flex!important; align-items:baseline!important; padding:4px 12px 4px 0!important; margin:0!important; font-family:"Inter","Segoe UI",system-ui,sans-serif!important; font-size:13.5px!important; font-weight:400!important; color:#16191f!important; line-height:1.5!important; text-transform:none!important; letter-spacing:normal!important; opacity:1!important; cursor:pointer!important; text-decoration:none!important; background:transparent!important; border:none!important; }');

      /* ---- Depth 0: Group headings — "Management Interface (Device Configuration)" ---- */
      css.push('[role="menu"] > li > label.-depth0 { padding-left:16px!important; font-weight:400!important; font-size:14px!important; color:#16191f!important; }');
      /* Triangle: ▼ when expanded, ▶ when collapsed */
      css.push('[role="menu"] > li > label.-depth0::before { content:"\\25B6"!important; font-size:0.6em!important; color:#545b64!important; margin-right:8px!important; display:inline-block!important; width:0.8em!important; flex-shrink:0!important; }');
      css.push('[role="menu"] > li[aria-expanded="true"] > label.-depth0::before { content:"\\25BC"!important; }');

      /* ---- Depth 1: Tags — "Management - Device Status" etc. ---- */
      css.push('[role="menu"] li > label.-depth1 { padding-left:36px!important; font-size:13.5px!important; color:#16191f!important; }');
      /* Triangle for expandable tags */
      css.push('[role="menu"] li > label.-depth1::before { content:"\\25B6"!important; font-size:0.55em!important; color:#545b64!important; margin-right:7px!important; display:inline-block!important; width:0.8em!important; flex-shrink:0!important; }');
      css.push('[role="menu"] li[aria-expanded="true"] > label.-depth1::before { content:"\\25BC"!important; }');
      /* Tags with no children (no aria-expanded) — no triangle, just indent */
      css.push('[role="menu"] li:not([aria-expanded]) > label.-depth1::before { content:""!important; width:0!important; margin:0!important; }');
      css.push('[role="menu"] li:not([aria-expanded]) > label.-depth1 { padding-left:50px!important; }');

      /* ---- Depth 2: Operations — "get_status", "get_version" etc. ---- */
      /* Operations use OperationMenuItemContent with a different label structure.
         Target by multiple selectors to ensure we catch the right elements. */
      css.push('[role="menu"] li li li[role="menuitem"] > label { padding-left:72px!important; font-size:13px!important; color:#16191f!important; }');
      css.push('[role="menu"] li > label.-depth2 { padding-left:72px!important; font-size:13px!important; color:#16191f!important; }');
      css.push('[role="menu"] li li li[role="menuitem"] > label::before, [role="menu"] li > label.-depth2::before { content:""!important; display:none!important; }');
      css.push('li[role="menuitem"] > label.-depth2 { padding-left:72px!important; }');

      /* ---- Hover & active ---- */
      css.push('[role="menu"] li > label:hover { color:#0073bb!important; background:transparent!important; }');
      css.push('[role="menu"] li > label.active { color:#0073bb!important; font-weight:600!important; background:transparent!important; }');

      /* ---- Spacing between depth-0 groups ---- */
      css.push('[role="menu"] > li { margin-top:6px!important; }');
      css.push('[role="menu"] > li:first-child { margin-top:0!important; }');

      var style = document.createElement('style');
      style.id = 'tree-sidebar-css';
      style.textContent = css.join('\n');
      document.head.appendChild(style);

      /* --- Click-to-toggle for group headings (depth-0) AND tag items (depth-1) --- */
      function setupGroupToggle() {
        /* Depth-0: group headings */
        var groupItems = root.querySelectorAll(':scope > li[role="menuitem"]');
        for (var i = 0; i < groupItems.length; i++) {
          var li = groupItems[i];
          if (li.getAttribute('data-tree-toggle') === '1') continue;
          li.setAttribute('data-tree-toggle', '1');
          (function(groupLi) {
            var label = groupLi.querySelector('label.-depth0');
            if (!label) return;
            label.addEventListener('click', function(e) {
              e.stopPropagation();
              var childUl = null;
              var kids = groupLi.children;
              for (var k = 0; k < kids.length; k++) {
                if (kids[k].tagName === 'UL') { childUl = kids[k]; break; }
              }
              if (!childUl) return;
              var isVisible = childUl.style.display !== 'none';
              childUl.style.display = isVisible ? 'none' : '';
              groupLi.setAttribute('aria-expanded', isVisible ? 'false' : 'true');
            });
          })(li);
        }

        /* Depth-1: tag items that have child operations */
        var tagItems = root.querySelectorAll('li[role="menuitem"]');
        for (var j = 0; j < tagItems.length; j++) {
          var tli = tagItems[j];
          var tLabel = tli.querySelector(':scope > label.-depth1');
          if (!tLabel) continue;
          if (tli.getAttribute('data-tree-toggle') === '1') continue;
          /* Check if this tag has a child <ul> (operations) */
          var tChildUl = null;
          var tKids = tli.children;
          for (var m = 0; m < tKids.length; m++) {
            if (tKids[m].tagName === 'UL') { tChildUl = tKids[m]; break; }
          }
          if (!tChildUl) continue;
          tli.setAttribute('data-tree-toggle', '1');
          (function(tagLi, tagLabel, tagUl) {
            tagLabel.addEventListener('click', function(e) {
              e.stopPropagation();
              var isVisible = tagUl.style.display !== 'none';
              tagUl.style.display = isVisible ? 'none' : '';
              tagLi.setAttribute('aria-expanded', isVisible ? 'false' : 'true');
            });
          })(tli, tLabel, tChildUl);
        }
      }
      setupGroupToggle();
      setInterval(setupGroupToggle, 800);

      /* Force depth-2 indentation via inline styles (CSS alone can't beat styled-components) */
      function indentDepth2() {
        var labels = root.querySelectorAll('label.-depth2');
        for (var d = 0; d < labels.length; d++) {
          labels[d].style.setProperty('padding-left', '72px', 'important');
        }
      }
      indentDepth2();
      setInterval(indentDepth2, 600);
    }

    var specUrl = 'openapi.yaml?v=' + Date.now();
    Redoc.init(specUrl, {
      theme: {
        colors: { primary: { main: '#2563eb' }, success: { main: '#059669' }, warning: { main: '#d97706' }, error: { main: '#dc2626' } },
        typography: { fontFamily: '"Inter", "Segoe UI", system-ui, sans-serif', headings: { fontFamily: '"Inter", "Segoe UI", system-ui, sans-serif' }, code: { fontFamily: 'Consolas, Monaco, monospace' } },
        sidebar: { backgroundColor: '#ffffff', textColor: '#333333', activeTextColor: '#0073bb', groupItems: { activeBackgroundColor: '#f2f3f3', activeTextColor: '#0073bb' } },
        rightPanel: { backgroundColor: '#1e293b', textColor: '#e2e8f0' }
      },
      pathInMiddlePanel: true,
      hideDownloadButton: false,
      hideLoading: true,
      noAutoAuth: true
    }, el, function() { setTimeout(runHide, 50); });

    [0, 100, 200, 500, 1200, 2500, 5000].forEach(function(ms) { setTimeout(runHide, ms); });
    var pollCount = 0;
    var poll = setInterval(function() {
      runHide();
      if (++pollCount >= 20) clearInterval(poll);
    }, 500);
    if (typeof MutationObserver !== 'undefined') {
      var obs = new MutationObserver(function() { setTimeout(runHide, 50); });
      obs.observe(el, { childList: true, subtree: true });
    }
  })();
  </script>
</body>
</html>
