        "version": "v2",
        "description": "**This is an MQTT API, not REST.** There are no HTTP endpoints. Each operation below is a **command**: you **publish** the JSON payload to your MQTT **command topic** (format: `<Tenant ID>/<Publish Topic>/<Device Serial No>`). Responses are received on the **command response** subscribe topic. The \"POST\" label is only for the spec format; in practice you use MQTT publish/subscribe. See **Getting Started** and **MQTT Communication Protocol** in the sidebar. For full guides, use the sidebar or [documentation home](index.html).",
