                                                                    },
                                                                    "target": {
                                                                        "type": "string",
                                                                        "enum": [
                                                                            "SESSION_SL",
                                                                            "SESSION_0",
                                                                            "SESSION_1",
                                                                            "SESSION_2",
                                                                            "SESSION_3"
                                                                        ],
                                                                        "description": "Specifies the session or SL (Select) flag to be used for filtering tags.  This helps in managing tag states and collisions during inventory(see EPC Gen2 Spec).\n"
                                                                    },
                                                                    "length": {
                                                                        "type": "integer",
                                                                        "description": "Specifies the number of bits in the tag's memory to be compared against the tagPattern.  This determines the size of the filter applied to the memory bank(see EPC Gen2 Spec).\n"
                                                                    }
                                                                },
                                                                "required": [
                                                                    "enable",
                                                                    "tagPattern",
                                                                    "memoryBank",
                                                                    "offset",
                                                                    "action",
                                                                    "target",
                                                                    "length"
                                                                ]
                                                            }
                                                        },
                                                        "tagMetaDataToEnable": {
                                                            "type": "object",
                                                            "description": "Specifies which metadata fields of the tag should be reported when it is read. Each field can be enabled or disabled based on the application's requirements. Note: For RFD4090 devices, XPC and CRC metadata fields are not supported.\n",
                                                            "properties": {
                                                                "RSSI": {
                                                                    "type": "boolean",
                                                                    "description": "Indicates whether to report the RSSI.  RSSI provides the strength of the signal received from the tag, which can be useful for determining tag proximity.\n"
                                                                },
                                                                "PHASE": {
                                                                    "type": "boolean",
                                                                    "description": "Indicates whether to report the phase angle of the tag's signal.  Phase information is often used for advanced applications like tag localization or movement tracking.\n"
                                                                },
                                                                "SEENCOUNT": {
                                                                    "type": "boolean",
                                                                    "description": "Indicates whether to report the number of times the tag was detected during inventory.  This helps in understanding tag visibility and read consistency over multiple scans.\n"
                                                                },
                                                                "CHANNEL": {
                                                                    "type": "boolean",
                                                                    "description": "Indicates whether to report the communication channel used to read the tag.  This is useful in environments with multiple channels or frequency hopping to identify the channel of operation.\n"
                                                                },
                                                                "PC": {
                                                                    "type": "boolean",
                                                                    "description": "Indicates whether to report the Protocol Control (PC) word.  The PC word contains information about the tag's memory structure and encoding, such as the length of the EPC.\n"
                                                                },
                                                                "XPC": {
                                                                    "type": "boolean",
                                                                    "description": "Indicates whether to report the Extended Protocol Control (XPC) word.  XPC provides additional protocol-related information for advanced tags, such as custom memory configurations.\n"
                                                                },
                                                                "CRC": {
                                                                    "type": "boolean",
                                                                    "description": "Indicates whether to report the CRC value.  CRC is used to verify the integrity of the tag's data and ensure error-free communication.\n"
                                                                },
                                                                "EPC": {
                                                                    "type": "boolean",
                                                                    "description": "Indicates whether to report the EPC.  EPC is the unique identifier stored in the tag's memory, typically used for item identification.\n"
                                                                },
                                                                "TID": {
                                                                    "type": "boolean",
                                                                    "description": "Indicates whether to report the TID.  TID is a factory-programmed, unique identifier for the tag, often used for authentication or anti-counterfeiting.\n"
                                                                },
                                                                "USER": {
                                                                    "type": "boolean",
                                                                    "description": "Indicates whether to report the User memory bank data.  The User memory bank can store custom data defined by the application, such as additional product information.\n"
                                                                },
                                                                "MAC": {
                                                                    "type": "boolean",
                                                                    "description": "Indicates whether to report the MAC address of the reader.  This is useful for identifying the specific reader that performed the tag read in networked environments.\n"
                                                                },
                                                                "HOSTNAME": {
                                                                    "type": "boolean",
                                                                    "description": "Indicates whether to report the hostname of the reader.  Hostnames are helpful in networked environments where readers are identified by their assigned names.\n"
                                                                }
                                                            }
                                                        }
                                                    }
                                                }
                                            }
                                        },
                                        "response": {
                                            "type": "object",
                                            "description": "Status of the command execution — check `code` to confirm success (0) or identify the error.",
                                            "properties": {
                                                "code": {
                                                    "type": "integer",
                                                    "example": "0",
                                                    "description": "Response code indicating success or failure.\n- **0** — Success\n- **3** — Not able to retrieve information",
                                                    "minimum": 0,
                                                    "maximum": 3
                                                },
                                                "description": {
                                                    "type": "string",
                                                    "description": "Human-readable description of the response code (e.g. \"Success\", \"Invalid payload\").",
                                                    "example": "Success"
                                                }
                                            },
                                            "required": [
                                                "code",
                                                "description"
                                            ]
                                        }
                                    },
                                    "required": [
                                        "command",
                                        "requestId",
                                        "apiVersion",
                                        "response"
                                    ]
                                },
                                "examples": {
                                    "example1": {
                                        "value": {
                                            "command": "get_operating_mode",
                                            "requestId": "abc123",
                                            "apiVersion": "V1.1",
                                            "operatingMode": {
                                                "operatingModes": {
                                                    "profiles": "BALANCED_PERFORMANCE",
                                                    "radioStartConditions": {
                                                        "trigger": "IMMEDIATE",
                                                        "startDelay": 0,
                                                        "periodicDuration": 0,
                                                        "repeat": false
                                                    },
                                                    "radioStopConditions": {
                                                        "trigger": "IMMEDIATE"
                                                    },
                                                    "query": {
                                                        "session": "SESSION_1",
                                                        "inventoryState": "STATE_A",
                                                        "slFlag": "ALL",
                                                        "tagPopulation": 30
                                                    },
                                                    "tagMetaDataToEnable": {
                                                        "RSSI": true,
                                                        "SEENCOUNT": true,
                                                        "XPC": false,
                                                        "CRC": false,
                                                        "EPC": false,
                                                        "TID": false,
                                                        "USER": false,
                                                        "MAC": false,
                                                        "HOSTNAME": false
                                                    }
                                                }
                                            },
                                            "response": {
                                                "code": 0,
                                                "description": "Success"
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                },
                "x-error-codes": [
                    {
                        "code": 0,
                        "description": "Success",
                        "iot_status_code": "IOT_STATUS_SUCCESS"
                    },
                    {
                        "code": 3,
                        "description": "Not able to retrieve information",
                        "iot_status_code": "IOT_ERROR_INFO_NOT_AVAILABLE"
                    }
                ]
            }
        },
        "/set_operating_mode": {
            "post": {
                "tags": [
                    "Operating Mode"
                ],
                "summary": "set_operating_mode",
                "description": "This operation is used to configure the operating mode of RFID devices. Note: When RFD40/90 sled is configured to FAST_READ profile, data events are not currently supported.\n\n**Download pdf:** 📄 [Download set_operating_mode as PDF](https://aa5123.github.io/zebra-rfd40-rfd90-iot-docs/command-pdfs/set_operating_mode.pdf)\n\n**Status / Error Codes**\n\n| Code | Status Constant | Description |\n|------|----------------|-------------|\n| 0 | `IOT_STATUS_SUCCESS` | Success |\n| 11 | `IOT_ERROR_INVENTORY_IN_PROGRESS` | Inventory in progress |\n| 22 | `IOT_CTRL_ADVANCED_PROFILE_NOT_SET` | Advanced configuration not set |\n| 23 | `IOT_ERROR_INVALID_ENUM` | Invalid enum value |\n| 24 | `IOT_ERROR_PREFILTERS_LIMIT_EXCEEDED` | Max 32 prefilters limit exceeded |\n| 28 | `IOT_ERROR_TAG_MATCH_PATTERN_LENGTH_EXCEEDED` | Tag match pattern length exceeded |",
                "requestBody": {
                    "required": true,
                    "content": {
                        "application/json": {
                            "schema": {
                                "type": "object",
                                "x-extension-1": null,
                                "properties": {
                                    "command": {
                                        "type": "string",
                                        "default": "set_operating_mode",
                                        "enum": [
                                            "set_operating_mode"
                                        ],
                                        "description": "Specifies the name of the command to be executed. In this case, it is set_operating_mode."
                                    },
                                    "requestId": {
                                        "type": "string",
                                        "example": "1286",
                                        "description": "A unique identifier for the request. This ensures traceability and prevents duplicate processing of the same request."
                                    },
                                    "operatingMode": {
                                        "type": "object",
                                        "description": "Represents the reader operating mode.",
                                        "properties": {
                                            "operatingModes": {
                                                "title": "operatingMode",
                                                "type": "object",
                                                "description": "Represents the reader operating mode.",
                                                "properties": {
                                                    "profiles": {
                                                        "type": "string",
                                                        "enum": [
                                                            "FAST_READ",
                                                            "CYCLE_COUNT",
                                                            "DENSE_READERS",
                                                            "OPTIMAL_BATTERY",
                                                            "BALANCED_PERFORMANCE",
                                                            "ADVANCED"
                                                        ],
                                                        "default": "BALANCED_PERFORMANCE",
                                                        "description": "The type of mode of operation \n\nFAST_READ: Configures the radio for maximum read speed within short range. (Currently not supported)\n\nCYCLE_COUNT: Configures the radio to read as many unique tags as possible.\n\nDENSE_READERS: Used when multiple readers in proximity.\n\nOPTIMAL_BATTERY: Gives best battery life.\n\nBALANCED_PERFORMANCE: Maintains balance between performance and battery life.\n\nADVANCED: Allows custom link profile settings in the advancedConfigurations.In this case, advancedConfigurations must be configured."
                                                    },
                                                    "advancedConfigurations": {
                                                        "type": "object",
                                                        "description": "To be set when profiles is ADVANCED. In other cases, link profile will be mapped internally.",
                                                        "properties": {
                                                            "transmitPower": {
                                                                "type": "number",
                                                                "example": 27
                                                            },
                                                            "linkProfile": {
                                                                "type": "string",
                                                                "enum": [
                                                                    "M4_256K",
                                                                    "M2_240K",
                                                                    "M2_256K",
                                                                    "M2_320K",
                                                                    "M4_240K",
                                                                    "M4_320K",
                                                                    "FM0_0K",
                                                                    "FM0_320K",
                                                                    "M8_240K",
                                                                    "M8_256K",
                                                                    "M8_320K"
                                                                ]
                                                            },
                                                            "session": {
                                                                "type": "string",
                                                                "enum": [
                                                                    "SESSION_0",
                                                                    "SESSION_1",
                                                                    "SESSION_2",
                                                                    "SESSION_3"
                                                                ]
                                                            },
                                                            "dynamicPower": {
                                                                "type": "boolean"
                                                            }
                                                        }
                                                    },
                                                    "accessOperations": {
                                                        "type": "array",
                                                        "description": "Supports read, write, lock and kill operations on tag memory banks (EPC, TID, USER, etc.). ",
                                                        "items": {
                                                            "type": "object",
                                                            "properties": {
                                                                "operationType": {
                                                                    "type": "string",
                                                                    "enum": [
                                                                        "READ",
                                                                        "WRITE",
                                                                        "ACCESS",
                                                                        "LOCK",
                                                                        "KILL"
                                                                    ],
                                                                    "description": "Specifies the type of access operation to perform on the tag.  - `READ`: Reads data from the specified memory bank. - `WRITE`: Writes data to the specified memory bank. - `ACCESS`: Performs access operations using a password. - `LOCK`: Locks or unlocks specified memory banks. - `KILL`: Permanently disables the tag using the kill password.\n"
                                                                },
                                                                "config": {
                                                                    "type": "object",
                                                                    "properties": {
                                                                        "memoryBank": {
                                                                            "type": "string",
                                                                            "enum": [
                                                                                "EPC",
                                                                                "TID",
                                                                                "USER",
                                                                                "RESERVED"
                                                                            ],
                                                                            "description": "Specifies the memory bank to be accessed. \n"
                                                                        },
                                                                        "offset": {
                                                                            "type": "integer",
                                                                            "description": "Indicates the starting word position within the specified memory bank  where the operation will be applied. Offset is measured in 16-bit words.\n"
                                                                        },
                                                                        "length": {
                                                                            "type": "integer",
                                                                            "description": "Specifies the number of 16-bit words to be read or written.  This determines the size of the data block for the operation.\n"
                                                                        },
                                                                        "data": {
                                                                            "type": "string",
                                                                            "description": "A hex string indicating the words to be written.  The length of the data field can exceed a single 16-bit word, but it must be a multiple of 16-bit words(see EPC Gen2 Spec).\n"
                                                                        },
                                                                        "password": {
                                                                            "type": "string",
                                                                            "description": "A hex string with exactly 8 hex characters  (32 bits) used for access, lock, or kill operations(see EPC Gen2 Spec).\n"
                                                                        },
                                                                        "lockMemBank": {
                                                                            "type": "string",
                                                                            "enum": [
                                                                                "EPC",
                                                                                "ACCESS_PWD",
                                                                                "KILL_PWD",
                                                                                "TID",
                                                                                "USER",
                                                                                "ALL"
                                                                            ],
                                                                            "description": "Specifies the memory bank to be locked or unlocked. \n"
                                                                        },
                                                                        "lockAction": {
                                                                            "type": "string",
                                                                            "enum": [
                                                                                "READ_AND_WRITE",
                                                                                "PERMANENT_LOCK",
                                                                                "PERMANENT_UNLOCK",
                                                                                "UNLOCK"
                                                                            ],
                                                                            "description": "Specifies the lock operation to perform on the memory bank with password if given."
                                                                        }
                                                                    }
                                                                }
                                                            }
                                                        }
                                                    },
                                                    "radioStartConditions": {
                                                        "type": "object",
                                                        "description": "Configures how and at what time intervals inventory of tags should be started. \n\nIf this configuration is absent, by default radio will immediately begin inventorying tags upon receiving a \"start\" command.",
                                                        "properties": {
                                                            "trigger": {
                                                                "type": "string",
                                                                "enum": [
                                                                    "PRESSED",
                                                                    "RELEASED",
                                                                    "IMMEDIATE"
                                                                ],
                                                                "description": "Represents the trigger configuration to start the inventory operation.  - `PRESSED`: Inventory starts when the trigger is pressed. - `RELEASED`: Inventory starts when the trigger is released. - `IMMEDIATE`: Inventory starts immediately without requiring a trigger action.\n"
                                                            },
                                                            "startDelay": {
                                                                "type": "integer",
                                                                "example": 3000,
                                                                "description": "Specifies the delay (in milliseconds) before starting the inventory operation.  This delay applies to any trigger configuration when set to a value greater than 0.  For example, if set to 3000 milliseconds, the inventory will start 3 seconds after the trigger action.\n"
                                                            },
                                                            "repeat": {
                                                                "type": "boolean",
                                                                "description": "Determines whether the inventory operation can be repeated using the trigger.  If enabled, pressing the trigger will start reading tags, and releasing it will stop the read operation (not abort).  Pressing the trigger again will restart the inventory operation. If disabled, pressing the trigger after stopping the inventory will not restart the operation."
                                                            }
                                                        }
                                                    },
                                                    "radioStopConditions": {
                                                        "type": "object",
                                                        "description": "Configures how and under what conditions the inventory of tags should stop. \n\nIf this configuration is absent, the radio will continue inventorying tags until a \"stop\" command is issued.",
                                                        "properties": {
                                                            "trigger": {
                                                                "type": "string",
                                                                "enum": [
                                                                    "PRESSED",
                                                                    "RELEASED",
                                                                    "IMMEDIATE"
                                                                ],
                                                                "description": "Represents the trigger configuration to stop the inventory operation.  - `PRESSED`: Inventory stops when the trigger is pressed. - `RELEASED`: Inventory stops when the trigger is released. - `IMMEDIATE`: Inventory stops immediately without requiring a trigger action.\n"
                                                            },
                                                            "tagCount": {
                                                                "type": "integer",
                                                                "description": "Specifies the number of unique tags to be read before stopping the inventory. \n"
                                                            },
                                                            "stopTimeout": {
                                                                "type": "integer",
                                                                "description": "Specifies the duration (in milliseconds) after which the inventory operation will stop. \n"
                                                            },
                                                            "inventoryCount": {
                                                                "type": "integer",
                                                                "description": "Specifies the number of inventory cycles to complete before stopping.  Each cycle represents a full scan for tags in the field."
                                                            }
                                                        }
                                                    },
                                                    "query": {
                                                        "type": "object",
                                                        "description": "Configures the query parameters for inventory operations including session, target, and tag population to optimize tag selection and reading. ",
                                                        "properties": {
                                                            "session": {
                                                                "type": "string",
                                                                "description": "Session field (see EPC Gen2 Spec). Determines the session used for inventory operations.  Sessions are used to manage tag states and collisions during inventory.  SESSION_0 is typically used for single inventory rounds, while SESSION_1, SESSION_2, and SESSION_3  are used for multi-round inventories with varying persistence levels.\n",
                                                                "enum": [
                                                                    "SESSION_0",
                                                                    "SESSION_1",
                                                                    "SESSION_2",
                                                                    "SESSION_3"
                                                                ]
                                                            },
                                                            "inventoryState": {
                                                                "type": "string",
                                                                "description": "Target field (see EPC Gen2 Spec). Specifies the inventory state of tags to be selected.  'STATE_A' and 'STATE_B' represent the two possible states of a tag's inventory flag.  'STATE_AB' flips between states to optimize tag selection during inventory rounds.\n",
                                                                "enum": [
                                                                    "STATE_A",
                                                                    "STATE_B",
                                                                    "STATE_AB"
                                                                ]
                                                            },
                                                            "slFlag": {
                                                                "type": "string",
                                                                "description": "Sel field (see EPC Gen2 Spec). Indicates the SL (Select) flag used to filter tags.  'ALL' selects all tags regardless of SL flag state.  'ASSERTED' selects only tags with an asserted SL flag, while 'DEASSERTED' selects tags with a deasserted SL flag.\n",
                                                                "enum": [
                                                                    "ALL",
                                                                    "ASSERTED",
                                                                    "DEASSERTED"
                                                                ]
                                                            },
                                                            "tagPopulation": {
                                                                "type": "integer",
                                                                "minimum": 0,
                                                                "description": "Estimates tag count to optimize reading. This value helps the reader adjust its settings  (e.g., Q parameter) to improve inventory performance for the expected number of tags in the field."
                                                            }
                                                        }
                                                    },
                                                    "select": {
                                                        "type": "array",
                                                        "description": "Configures the pre-filtering of tags during inventory operations. \nThis allows for selective reading of tags based on specific criteria, optimizing inventory performance.\nSupports up to 32 select filters.",
                                                        "items": {
                                                            "type": "object",
                                                            "properties": {
                                                                "enable": {
                                                                    "type": "boolean",
                                                                    "description": "Used to enable and disable the pre-filter. Set to true to enable the pre-filter,  allowing the reader to apply specific filtering criteria to tags before inventory operations.\n"
                                                                },
                                                                "tagPattern": {
                                                                    "type": "string",
                                                                    "description": "Specifies the bit pattern to match against the tag's memory content.  The value must be a hex string (only values 0-9, a-f or A-F) and must have an even number of characters, max 64 characters.  This is used to filter tags based on specific data stored in their memory(see EPC Gen2 Spec).\n"
                                                                },
                                                                "memoryBank": {
                                                                    "type": "string",
                                                                    "enum": [
                                                                        "EPC",
                                                                        "TID",
                                                                        "USER"
                                                                    ],
                                                                    "description": "Membank field (see EPC Gen2 Spec). Specifies the memory bank to be accessed for filtering. \n"
                                                                },
                                                                "offset": {
                                                                    "type": "integer",
                                                                    "description": "Indicates the starting bit position within the specified memory bank where the tagPattern will be applied for matching(see EPC Gen2 Spec).\n"
                                                                },
                                                                "action": {
                                                                    "type": "string",
                                                                    "enum": [
                                                                        "INV_A_NOT_INV_B_OR_ASRT_SL_NOT_DSRT_SL",
                                                                        "INV_A_OR_ASRT_SL",
                                                                        "NOT_INV_B_OR_NOT_DSRT_SL",
                                                                        "INV_A2BB2A_NOT_INV_A_OR_NEG_SL_NOT_ASRT_SL",
                                                                        "INV_B_NOT_INV_A_OR_DSRT_SL_NOT_ASRT_SL",
                                                                        "INV_B_OR_DSRT_SL",
                                                                        "NOT_INV_A_OR_NOT_ASRT_SL",
                                                                        "NOT_INV_A2BB2A_OR_NOT_NEG_SL"
                                                                    ],
                                                                    "description": "Defines how to set SL/invnetory flag if match/mismatch occurs. These actions determine how tags are selected or excluded during inventory operations(see EPC Gen2 Spec).\n"
                                                                },
                                                                "target": {
                                                                    "type": "string",
                                                                    "enum": [
                                                                        "SESSION_SL",
                                                                        "SESSION_0",
                                                                        "SESSION_1",
                                                                        "SESSION_2",
                                                                        "SESSION_3"
                                                                    ],
                                                                    "description": "Specifies the session or SL (Select) flag to be used for filtering tags.  This helps in managing tag states and collisions during inventory(see EPC Gen2 Spec).\n"
                                                                },
                                                                "length": {
                                                                    "type": "integer",
                                                                    "description": "Specifies the number of bits in the tag's memory to be compared against the tagPattern.  This determines the size of the filter applied to the memory bank(see EPC Gen2 Spec).\n"
                                                                }
                                                            },
                                                            "required": [
                                                                "enable",
                                                                "tagPattern",
                                                                "memoryBank",
                                                                "offset",
                                                                "action",
                                                                "target",
                                                                "length"
                                                            ]
                                                        }
                                                    },
                                                    "tagMetaDataToEnable": {
                                                        "type": "object",
                                                        "description": "Specifies which metadata fields of the tag should be reported when it is read. Each field can be enabled or disabled based on the application's requirements. Note: For RFD4090 devices, XPC and CRC metadata fields are not supported.\n",
                                                        "properties": {
                                                            "RSSI": {
                                                                "type": "boolean",
                                                                "description": "Indicates whether to report the RSSI.  RSSI provides the strength of the signal received from the tag, which can be useful for determining tag proximity.\n"
                                                            },
                                                            "PHASE": {
                                                                "type": "boolean",
                                                                "description": "Indicates whether to report the phase angle of the tag's signal.  Phase information is often used for advanced applications like tag localization or movement tracking.\n"
                                                            },
                                                            "SEENCOUNT": {
                                                                "type": "boolean",
                                                                "description": "Indicates whether to report the number of times the tag was detected during inventory.  This helps in understanding tag visibility and read consistency over multiple scans.\n"
                                                            },
                                                            "CHANNEL": {
                                                                "type": "boolean",
                                                                "description": "Indicates whether to report the communication channel used to read the tag.  This is useful in environments with multiple channels or frequency hopping to identify the channel of operation.\n"
                                                            },
                                                            "PC": {
                                                                "type": "boolean",
                                                                "description": "Indicates whether to report the Protocol Control (PC) word.  The PC word contains information about the tag's memory structure and encoding, such as the length of the EPC.\n"
                                                            },
                                                            "XPC": {
                                                                "type": "boolean",
                                                                "description": "Indicates whether to report the Extended Protocol Control (XPC) word.  XPC provides additional protocol-related information for advanced tags, such as custom memory configurations.\n"
                                                            },
                                                            "CRC": {
                                                                "type": "boolean",
                                                                "description": "Indicates whether to report the CRC value.  CRC is used to verify the integrity of the tag's data and ensure error-free communication.\n"
                                                            },
                                                            "EPC": {
                                                                "type": "boolean",
                                                                "description": "Indicates whether to report the EPC.  EPC is the unique identifier stored in the tag's memory, typically used for item identification.\n"
                                                            },
                                                            "TID": {
                                                                "type": "boolean",
                                                                "description": "Indicates whether to report the TID.  TID is a factory-programmed, unique identifier for the tag, often used for authentication or anti-counterfeiting.\n"
                                                            },
                                                            "USER": {
                                                                "type": "boolean",
                                                                "description": "Indicates whether to report the User memory bank data.  The User memory bank can store custom data defined by the application, such as additional product information.\n"
                                                            },
                                                            "MAC": {
                                                                "type": "boolean",
                                                                "description": "Indicates whether to report the MAC address of the reader.  This is useful for identifying the specific reader that performed the tag read in networked environments.\n"
                                                            },
                                                            "HOSTNAME": {
                                                                "type": "boolean",
                                                                "description": "Indicates whether to report the hostname of the reader.  Hostnames are helpful in networked environments where readers are identified by their assigned names.\n"
                                                            }
                                                        }
                                                    }
                                                }
                                            }
                                        }
                                    }
                                },
                                "required": [
                                    "command",
                                    "requestId"
                                ]
                            },
                            "examples": {
                                "Set operating mode": {
                                    "description": "Payload to set operating mode configurations",
                                    "value": {
                                        "command": "set_operating_mode",
                                        "requestId": "1286",
                                        "operatingMode": {
                                            "operatingModes": {
                                                "profiles": "ADVANCED",
                                                "advancedConfigurations": {
                                                    "transmitPower": 300,
                                                    "linkProfile": "M2_240K",
                                                    "session": "SESSION_1",
                                                    "dynamicPower": true
                                                },
                                                "accessOperations": [
                                                    {
