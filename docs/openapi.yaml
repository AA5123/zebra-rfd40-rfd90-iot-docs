                                            "type": "number",
                                            "example": 120,
                                            "description": "A unique numerical identifier for the event."
                                        },
                                        "upTime": {
                                            "type": "string",
                                            "example": "5 days 4hr 3min",
                                            "description": "The duration for which the system has been running since the last restart."
                                        },
                                        "details": {
                                            "type": "object",
                                            "properties": {
                                                "exceptions": {
                                                    "anyOf": [
                                                        {
                                                            "description": "A collection of diagnostic, error, or warning events.",
                                                            "properties": {
                                                                "radio": {
                                                                    "type": "object",
                                                                    "description": "Represents diagnostic, error, or warning events related to the radio module.",
                                                                    "properties": {
                                                                        "code": {
                                                                            "type": "number",
                                                                            "example": 51,
                                                                            "description": "A numeric code representing a specific radio-related issue or state."
                                                                        },
                                                                        "message": {
                                                                            "type": "string",
                                                                            "example": "radio is not responsive",
