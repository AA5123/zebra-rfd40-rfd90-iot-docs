        "/set_post_filter": {
            "post": {
                "tags": [
                    "Control - Tag Filtering"
                ],
                "summary": "set_post_filter",
                "description": "This operation is used to set a post-filter for RFID device, enabling the filtering of tags scanned by the device based on specific criteria.",
                "requestBody": {
                    "required": true,
                    "content": {
                        "application/json": {
                            "schema": {
                                "type": "object",
                                "description": "See examples for payload structure."
                            },
                            "examples": {
                                "Set post filter 1": {
                                    "description": "Payload to filter tags using prefix",
                                    "value": {
                                        "command": "set_post_filter",
                                        "requestId": "abc123",
                                        "postFilterPayload": {
                                            "operation": "ADD",
                                            "dataEpType": "DATA_EP1",
                                            "matchPattern": "FFFFBBBBA500",
                                            "matchPatternMethod": "PREFIX",
                                            "reportOperation": "INCLUDE",
                                            "reportDuration": 0,
                                            "seenCount": 0,
                                            "rssiThreshold": -88
                                        }
                                    }
                                },
                                "Set post filter 2": {
                                    "description": "Payload to filter tags based on regex",
                                    "value": {
                                        "command": "set_post_filter",
                                        "requestId": "abc123",
                                        "postFilterPayload": {
                                            "operation": "ADD",
                                            "dataEpType": "DATA_EP1",
                                            "matchPattern": "E280",
                                            "matchPatternMethod": "REGEX",
                                            "reportOperation": "EXCLUDE",
                                            "reportDuration": 0,
                                            "seenCount": 0,
                                            "rssiThreshold": -88
                                        }
                                    }
                                }
                            }
                        }
                    }
                },
                "responses": {
                    "200": {
                        "description": "Success",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "type": "object",
                                    "description": "See examples for payload structure."
                                },
                                "examples": {
                                    "example1": {
                                        "description": "",
                                        "value": {
                                            "command": "set_post_filter",
                                            "requestId": "abc123",
                                            "apiVersion": "V1.1",
                                            "response": {
                                                "code": 0,
                                                "description": "Success"
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        },
