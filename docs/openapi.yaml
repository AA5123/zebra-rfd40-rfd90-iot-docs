        "/config_events": {
            "post": {
                "tags": [
                    "Event Configuration"
                ],
                "summary": "config_events",
                "description": "Enables or disables specific device events. To apply the changes, a device reboot is required. For RFD4090 devices, only the following events are supported: terminalConnection, firmwareUpdate, network, exceptions, ntp, heartbeat, power, battery, and fileDownload.\n\n**Download pdf:** 📄 [Download config_events as PDF](https://aa5123.github.io/zebra-rfd40-rfd90-iot-docs/command-pdfs/config_events.pdf)",
                "requestBody": {
                    "required": true,
                    "content": {
                        "application/json": {
                            "schema": {
                                "type": "object",
                                "properties": {
                                    "command": {
                                        "type": "string",
                                        "example": "config_events",
                                        "description": "Command issued to configure events & alert threshold values"
                                    },
                                    "requestId": {
                                        "type": "string",
                                        "example": "abc123",
                                        "description": "A unique identifier for the request, allowing tracking and debugging of the operation."
                                    },
                                    "eventConfiguration": {
                                        "type": "object",
                                        "properties": {
                                            "antenna": {
                                                "type": "boolean",
                                                "description": "set to true to enable antenna events"
                                            },
                                            "terminalConnection": {
                                                "type": "boolean",
                                                "description": "set to true to enable terminal connection/disconnection events"
                                            },
                                            "firmwareUpdate": {
                                                "type": "boolean",
                                                "description": "set to true to enable fw update events"
                                            },
                                            "gpi": {
                                                "type": "boolean",
                                                "description": "set to true to enable gpi events"
                                            },
                                            "network": {
                                                "type": "boolean",
                                                "description": "set to true to enable network events"
                                            },
                                            "exceptions": {
                                                "type": "boolean",
                                                "description": "set to true to enable exception events"
                                            },
                                            "ntp": {
                                                "type": "boolean",
                                                "description": "set to true to enable battery alerts"
                                            },
                                            "userApp": {
                                                "type": "boolean",
                                                "description": "set to true to enable user app events"
                                            },
                                            "heartbeat": {
                                                "type": "boolean",
                                                "description": "set to true to enable heart beat"
                                            },
                                            "power": {
                                                "type": "boolean",
                                                "description": "set to true to enable power source alerts"
                                            },
                                            "battery": {
                                                "type": "boolean",
                                                "description": "set to true to enable battery alerts"
                                            },
                                            "temperature": {
                                                "type": "boolean",
                                                "description": "set to true to enable temperature alerts"
                                            },
                                            "fileDownload": {
                                                "type": "boolean",
                                                "description": "set to true to enable file download alerts"
                                            },
                                            "cpuUsage": {
                                                "type": "boolean",
                                                "description": "set to true to enable cpu usage alerts"
                                            },
                                            "flashUsage": {
                                                "type": "boolean",
                                                "description": "set to true to enable flash usage alerts"
                                            },
                                            "ramUsage": {
                                                "type": "boolean",
                                                "description": "set to true to enable ram usage alerts"
                                            },
                                            "heartbeatConfiguration": {
                                                "type": "object",
                                                "properties": {
                                                    "interval": {
                                                        "type": "integer",
                                                        "example": 100,
                                                        "description": "heart beat interval in seconds"
                                                    },
                                                    "inventoryStatus": {
                                                        "type": "boolean",
                                                        "description": "set to true to enable inventory status as part of heartbeat message"
                                                    },
                                                    "batteryStatus": {
                                                        "type": "boolean",
                                                        "description": "set to true to enable battery status as part of heartbeat message"
                                                    },
                                                    "userApps": {
                                                        "type": "boolean",
                                                        "description": "set to true to enable user app status as part of heartbeat message"
                                                    }
                                                }
                                            },
                                            "cpuThreshold": {
                                                "type": "integer",
                                                "description": "cpu usage value(%) above which alert will be triggered"
                                            },
                                            "ramThreshold": {
                                                "type": "integer",
                                                "description": "ram usage value(%) above which alert will be triggered"
                                            },
                                            "flashThreshold": {
                                                "type": "integer",
                                                "description": "flash usage value(%) above which alert will be triggered"
                                            },
                                            "temperatureThreshold": {
                                                "type": "integer",
                                                "description": "temperature treshold value above which alert will be triggered"
                                            }
                                        }
                                    }
                                },
                                "required": [
                                    "command",
                                    "requestId"
                                ]
                            },
                            "examples": {
                                "Enable all events": {
                                    "description": "Payload to enable all event types with threshold configuration",
                                    "value": {
                                        "command": "config_events",
                                        "requestId": "abc123",
                                        "eventConfiguration": {
                                            "antenna": true,
                                            "terminalConnection": true,
                                            "firmwareUpdate": true,
                                            "gpi": true,
                                            "network": true,
                                            "exceptions": true,
                                            "ntp": true,
                                            "userApp": true,
                                            "heartbeat": true,
                                            "power": true,
                                            "battery": true,
                                            "temperature": true,
                                            "fileDownload": true,
                                            "cpuUsage": true,
                                            "flashUsage": true,
                                            "ramUsage": true,
                                            "heartbeatConfiguration": {
                                                "interval": 100,
                                                "inventoryStatus": true,
                                                "batteryStatus": true,
                                                "userApps": true
                                            },
                                            "cpuThreshold": 80,
                                            "ramThreshold": 80,
                                            "flashThreshold": 80,
                                            "temperatureThreshold": 55
                                        }
                                    }
                                },
                                "Selective events": {
                                    "description": "Payload to selectively enable/disable specific event types",
                                    "value": {
                                        "command": "config_events",
                                        "requestId": "abc123",
                                        "eventConfiguration": {
                                            "antenna": false,
                                            "terminalConnection": true,
                                            "firmwareUpdate": true,
                                            "gpi": false,
                                            "network": true,
                                            "exceptions": false,
                                            "ntp": false,
                                            "userApp": false,
                                            "heartbeat": false,
                                            "power": true,
                                            "battery": true,
                                            "temperature": true,
                                            "fileDownload": true,
                                            "cpuUsage": false,
                                            "flashUsage": false,
                                            "ramUsage": false
                                        }
                                    }
                                }
                            }
                        }
                    }
                },
                "responses": {
                    "default": {
                        "description": "config_events response",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "type": "object",
                                    "properties": {
                                        "command": {
                                            "type": "string",
                                            "example": "config_events"
                                        },
                                        "requestId": {
                                            "type": "string",
                                            "example": "abc123"
                                        },
                                        "apiVersion": {
                                            "type": "string",
                                            "example": "V1.1",
                                            "enum": [
                                                "V1.0",
                                                "V1.1"
                                            ]
                                        },
                                        "response": {
                                            "type": "object",
                                            "description": "Status of the command execution — check `code` to confirm success (0) or identify the error.",
                                            "properties": {
                                                "code": {
                                                    "type": "integer",
                                                    "example": "0",
                                                    "description": "Response code indicating success or failure.\n- **0** — Success\n- **1** — Command payload accepted\n- **2** — Invalid payload\n- **3** — Not able to retrieve information\n- **4** — Firmware update in progress\n- **5** — Can't reboot, inventory in progress\n- **6** — Region is not configured\n- **7** — Interface is not available\n- **8** — Insufficient flash size\n- **9** — File not found\n- **10** — Configuration already exists\n- **11** — Inventory in progress\n- **12** — No radio operation in progress\n- **13** — Firmware update failed\n- **14** — Battery too low for firmware update\n- **15** — WIFI: SSID not found\n- **16** — WIFI: Cannot delete active SSID\n- **17** — WIFI: SSID missing\n- **18** — WIFI: SSID already exists\n- **19** — WIFI: SSID count overflow\n- **20** — WiFi is not supported\n- **21** — Certificate not found\n- **22** — Advanced configuration not set\n- **23** — Invalid enum value\n- **24** — Max 32 prefilters limit exceeded\n- **25** — Max 3 publish topics exceeded\n- **26** — Max 1 subscribe topic exceeded\n- **27** — Invalid tenant ID length\n- **28** — Tag match pattern length exceeded",
                                                    "minimum": 0,
                                                    "maximum": 24
                                                },
                                                "description": {
                                                    "type": "string",
                                                    "description": "Human-readable description of the response code (e.g. \"Success\", \"Invalid payload\").",
                                                    "example": "Success"
                                                }
                                            },
                                            "required": [
                                                "code",
                                                "description"
                                            ]
                                        }
                                    },
                                    "required": [
                                        "command",
                                        "requestId",
                                        "apiVersion",
                                        "response"
                                    ]
                                },
                                "examples": {
                                    "example1": {
                                        "value": {
                                            "command": "config_events",
                                            "requestId": "abc123",
                                            "apiVersion": "V1.1",
                                            "response": {
                                                "code": 0,
                                                "description": "Success"
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        },
        "/dataEVT": {
            "post": {
                "tags": [
                    "Tag Data Event"
                ],
                "summary": "dataEVT",
                "description": "Data Events capture and represent the structured information related to various events generated by the system. These events may include tag data, barcode data, and other relevant event-related details. They are utilized for tracking, monitoring, and analyzing system operations and behaviors in real-time or during post-event reviews.\n\n**Download pdf:** 📄 [Download dataEVT as PDF](https://aa5123.github.io/zebra-rfd40-rfd90-iot-docs/command-pdfs/dataEVT.pdf)",
                "responses": {
                    "default": {
                        "description": "dataEVT event payload",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "type": "object",
                                    "properties": {
                                        "type": {
                                            "type": "string",
                                            "description": "Type of operating mode (e.g., BALANCED_PERFORMANCE, FAST_READ, etc.)",
                                            "enum": [
                                                "FAST_READ",
                                                "CYCLE_COUNT",
                                                "DENSE_READERS",
                                                "OPTIMAL_BATTERY",
                                                "BALANCED_PERFORMANCE",
                                                "ADVANCED"
                                            ],
                                            "example": "BALANCED_PERFORMANCE"
                                        },
                                        "timestamp": {
                                            "type": "string",
                                            "description": "Timestamp of the event in ISO-8601 format"
                                        },
                                        "data": {
                                            "type": "object",
                                            "properties": {
                                                "tagData": {
                                                    "type": "array",
                                                    "description": "Contains a collection of tag data events.",
                                                    "items": {
                                                        "type": "object",
                                                        "description": "Tag Data Events",
                                                        "properties": {
                                                            "EPCid": {
                                                                "description": "EPCID refers to the Electronic Product Code Identifier, a unique identifier encoded on an RFID tag to identify a specific physical object.\n\nThe EPCID is a critical component in RFID systems, as it provides a globally unique identifier for items in the supply chain. It is encoded in the RFID tag's memory and is used to distinguish one item from another, even if they are of the same type or category.\n\nThe EPCID is typically represented as a hexadecimal string and follows the EPCglobal standard, which ensures interoperability across different RFID systems and organizations. This identifier can be used for tracking, inventory management, and authentication purposes.\n\nEPCID will be reported as a hex string.",
                                                                "example": "b06a",
                                                                "type": "string"
                                                            },
                                                            "EPC": {
                                                                "description": "The EPC (Electronic Product Code) memory bank is a section of memory on an RFID tag that stores the unique identifier for the tagged object. This identifier is used to distinguish one item from another in a supply chain or inventory system.\n\nThe EPC memory bank typically contains a globally unique identifier encoded as a hexadecimal string, following the EPCglobal standard. This standard ensures interoperability across different RFID systems and organizations. The EPC memory bank is critical for tracking, inventory management, and authentication purposes.\n\nThe data in the EPC memory bank is often used in conjunction with other memory banks, such as TID and USER, to provide comprehensive information about the tagged object. The EPC memory bank is read during the inventory process and is essential for identifying and managing items in real-time.\n\nEPC will be reported as hex string.",
                                                                "example": "b06a",
                                                                "type": "string"
                                                            },
                                                            "TID": {
                                                                "type": "string",
                                                                "description": "The TID (Tag Identifier) memory bank is a section of memory on an RFID tag that contains a unique identifier assigned by the tag manufacturer. This identifier is typically immutable and is used to uniquely identify the tag regardless of the data stored in other memory banks. The TID memory bank may also include additional information about the tag, such as the manufacturer ID and model number. The data in this bank is encoded as a hexadecimal string and is often used for authentication or anti-counterfeiting purposes.\n\nTID will be reported as hex string.",
                                                                "example": "e20060030178529d"
                                                            },
                                                            "USER": {
                                                                "description": "The \"USER\" memory bank in RFID tags is a user-defined memory area that can store custom data.\nThis memory bank is typically used for application-specific purposes, allowing users to write\nand read data relevant to their use case. The data is represented as a hexadecimal string,\nproviding a compact and efficient format for storage and transmission. The size and structure\nof the USER memory bank may vary depending on the RFID tag's specifications. It is commonly\nused in scenarios such as asset tracking, inventory management, and custom identification\nsystems. Ensure proper handling of the data to maintain data integrity and security.\n\nUSER will be reported as hex string.",
                                                                "example": "12343333123456781234567812345678123456781234567812345678123456781234567812345678123456781234567812345678123456781234567812345678",
                                                                "type": "string"
                                                            },
                                                            "RESERVED": {
                                                                "type": "string",
                                                                "description": "The RESERVED memory bank is a section of memory on an RFID tag that is typically used for storing passwords or other security-related data. It may include the kill password and access password, which are used to control access to the tag and to permanently disable it, respectively. The data in this bank is encoded as a hexadecimal string and is often protected or restricted based on the tag's configuration.\n\nRESERVED will be reported as hex string.",
                                                                "example": "12343333123456781234567812345678123456781234567812345678123456781234567812345678123456781234567812345678123456781234567812345678"
                                                            },
                                                            "PC": {
                                                                "type": "string",
                                                                "description": "\"PC\" will report the PC bits of the inventoried tag as a hex string.",
                                                                "example": "3000"
                                                            },
                                                            "CRC": {
                                                                "type": "string",
                                                                "description": "\"CRC\" will report the CRC bits of the inventoried tag as a hex string.",
                                                                "example": "b06a"
                                                            },
                                                            "channel": {
                                                                "type": "number",
                                                                "description": "\"CHANNEL” will report the channel (in MHz) the reader was using when the tag was inventoried. This value will only be reported if each individual tag read is reported (in other words, if reportFilter duration is set to 0). Otherwise, it will not be reported.",
                                                                "example": 911.75
                                                            },
                                                            "eventNum": {
                                                                "type": "number",
                                                                "description": "Event Number",
                                                                "example": 1
                                                            },
                                                            "format": {
                                                                "type": "string",
                                                                "description": "The format of idHex is EPC",
                                                                "example": "epc"
                                                            },
                                                            "peakRssi": {
                                                                "type": "number",
                                                                "description": "“RSSI” will report the rssi (in dbm) of the inventoried tag. If the tag is only reported occasionally (see set_tag_filter), this tag will be the peak rssi since the last reported read.",
                                                                "example": -39
                                                            },
                                                            "phase": {
                                                                "type": "number",
                                                                "description": "\"PHASE” will report the phase (in degrees) of the inventoried tag. This value will only be reported if each individual tag read is reported (in other words, if reportFilter duration is set to 0). Otherwise, it will not be reported.",
                                                                "example": 0
                                                            },
                                                            "seenCount": {
                                                                "type": "number",
                                                                "description": "“SEEN_COUNT” will report the number of times the tag has been inventoried since the previous report. This value will always be 1 if each individual tag read is reported (in other words, if reportFilter duration is set to 0).",
                                                                "example": 1
                                                            },
                                                            "XPC": {
                                                                "type": "string",
                                                                "description": "\"XPC\" will report the XPC bits of the inventoried tag, if present, as a hex string."
                                                            },
                                                            "accessResults": {
                                                                "type": "array",
                                                                "description": "accessResults contains an array of strings, with each element in the array containing the result of the access operation specified in the operating mode. For read operations, the string contains the data read from the tag and for write operations, it contains \"SUCCESS\" for successfull operations or an error message.\n",
                                                                "items": {
                                                                    "type": "string",
                                                                    "example": "SUCCESS"
                                                                }
                                                            },
                                                            "userDefined": {
                                                                "type": "string",
                                                                "description": "userdefined string value to be included on every event"
                                                            },
                                                            "firstSeenTime": {
                                                                "type": "number",
                                                                "description": "\"FIRST_SEEN_TIME\" will report the timestamp (in milliseconds since epoch) when the RFID tag was first seen by the reader."
                                                            },
                                                            "lastSeenTime": {
                                                                "description": "\"LAST_SEEN_TIME\" will report the timestamp (in milliseconds since epoch) when the RFID tag was last seen by the reader.",
                                                                "type": "number"
                                                            },
                                                            "MAC": {
                                                                "description": "The MAC address of the reader that inventoried the tag. This will be reported only if the MAC address is enabled in the operating mode.",
                                                                "type": "string"
                                                            },
                                                            "HOSTNAME": {
                                                                "description": "The hostname of the reader that inventoried the tag. This will be reported only if the hostname is enabled in the operating mode.",
                                                                "type": "string"
                                                            }
                                                        },
                                                        "required": [
                                                            "eventNum",
                                                            "format"
                                                        ]
                                                    }
                                                },
                                                "barcodeData": {
                                                    "type": "array",
                                                    "description": "Contains a collection of barcode data events.",
                                                    "items": {
                                                        "type": "object",
                                                        "description": "Scanned barcode Data Events",
                                                        "properties": {
                                                            "symbology": {
                                                                "type": "string",
                                                                "description": "The type of barcode symbology used in the scanned barcode (e.g., CODE_39).",
                                                                "enum": [
                                                                    "CODE_39"
                                                                ]
                                                            },
                                                            "decodedBarcode": {
                                                                "type": "string",
                                                                "description": "The decoded string value from the scanned barcode."
                                                            }
                                                        },
                                                        "required": [
                                                            "decodedBarcode"
                                                        ]
                                                    }
                                                }
                                            }
                                        }
                                    },
                                    "required": [
                                        "timestamp"
                                    ]
