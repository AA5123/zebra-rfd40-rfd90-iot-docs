                    "MQTT Connectivity"
                ],
                "summary": "mqttConnEVT",
                "description": "This event provides details about the connection state of a device, including its metadata and protocol versions.\n\n**Download pdf:** 📄 [Download mqttConnEVT as PDF](https://aa5123.github.io/zebra-rfd40-rfd90-iot-docs/command-pdfs/mqttConnEVT.pdf)",
                "responses": {
