                                                                        }
                                                                    }
                                                                },
                                                                "scanner": {
                                                                    "type": "object",
                                                                    "description": "Represents diagnostic, error, or warning events related to the scanner module.",
                                                                    "properties": {
                                                                        "code": {
                                                                            "type": "number",
                                                                            "example": 0,
                                                                            "description": "A numeric code representing a specific scanner-related issue or state."
                                                                        },
                                                                        "message": {
                                                                            "type": "string",
                                                                            "example": "scanner is connected and scanning in progress",
                                                                            "description": "A human-readable message describing the scanner issue or state."
                                                                        }
                                                                    }
                                                                },
                                                                "system": {
                                                                    "type": "object",
                                                                    "description": "Represents diagnostic, error, or warning events related to the system.",
                                                                    "properties": {
                                                                        "code": {
                                                                            "type": "number",
                                                                            "example": 12,
                                                                            "description": "A numeric code representing a specific system-related issue or state."
                                                                        },
                                                                        "message": {
                                                                            "type": "string",
                                                                            "example": "running out of memory",
                                                                            "description": "A human-readable message describing the system issue or state."
                                                                        }
                                                                    }
                                                                }
                                                            }
                                                        }
                                                    ],
                                                    "type": "object"
                                                }
                                            }
                                        }
                                    }
                                },
                                "examples": {
                                    "example1": {
                                        "value": {
                                            "eventName": "exception",
                                            "timestamp": "2019-08-24T14:15:22Z",
                                            "eventNumber": 120,
                                            "upTime": "5 days 4hr 3min",
                                            "details": {
                                                "exceptions": {
                                                    "radio": {
                                                        "code": 51,
                                                        "message": "radio is not responsive"
                                                    },
                                                    "scanner": {
                                                        "code": 0,
                                                        "message": "scanner is connected and scanning in progress "
                                                    },
                                                    "system": {
                                                        "code": 12,
                                                        "message": "running out of memory "
                                                    }
                                                }
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        },
        "/mqttConnEVT": {
