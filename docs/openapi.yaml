    "paths": {
        "/get_post_filter": {
            "post": {
                "tags": [
                    "Control - Tag Filtering"
                ],
                "summary": "get_post_filter",
                "description": "This operation is used to fetch the post filter applied to filter tag data in RFID devices. The post filter ensures that only relevant tag data is processed based on specified criteria.",
                "requestBody": {
                    "required": true,
                    "content": {
                        "application/json": {
                            "schema": {
                                "type": "object",
                                "description": "See examples for payload structure."
                            },
                            "examples": {
                                "Get post filter": {
                                    "description": "Payload to get post filter configurations",
                                    "value": {
                                        "command": "get_post_filter",
                                        "requestId": "abc123"
                                    }
                                }
                            }
                        }
                    }
                },
                "responses": {
                    "200": {
                        "description": "Success",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "type": "object",
                                    "description": "See examples for payload structure."
                                },
                                "examples": {
                                    "example1": {
                                        "description": "",
                                        "value": {
                                            "command": "get_post_filter",
                                            "requestId": "abc123",
                                            "apiVersion": "V1.1",
                                            "postFilterPayload": {
                                                "postFilter": [
                                                    {
                                                        "dataEpType": "DATA_EP1",
                                                        "matchPattern": "FFFF",
                                                        "matchPatternMethod": "REGEX",
                                                        "reportOperation": "INCLUDE",
                                                        "reportDuration": 0,
                                                        "seenCount": 0,
                                                        "rssiThreshold": -88
                                                    }
                                                ]
                                            },
                                            "response": {
                                                "code": 0,
                                                "description": "Success"
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        },
