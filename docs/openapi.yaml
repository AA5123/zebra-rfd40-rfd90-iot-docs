                                                                        "format": "ipv6",
                                                                        "description": "The IPv6 address to assign to the interface."
                                                                    },
                                                                    "prefix": {
                                                                        "type": "integer",
                                                                        "example": "65",
                                                                        "description": "The IPv6 address prefix length."
                                                                    },
                                                                    "gateway": {
                                                                        "type": "string",
                                                                        "example": "192.168.1.144",
                                                                        "format": "ipv4",
                                                                        "description": "The IPv6 gateway address."
                                                                    },
                                                                    "enableAuto": {
                                                                        "type": "boolean",
                                                                        "description": "Specifies whether automatic IPv6 address assignment (e.g., SLAAC) is enabled."
                                                                    },
                                                                    "dnsServer": {
                                                                        "type": "string",
                                                                        "example": "2001:4860:4860::9999",
                                                                        "format": "ipv6",
                                                                        "description": "The IPv6 address of the DNS server."
                                                                    },
                                                                    "domainName": {
                                                                        "type": "string",
