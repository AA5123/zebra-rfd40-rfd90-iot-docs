        "/set_config": {
            "post": {
                "tags": [
                    "Device Configuration"
                ],
                "summary": "set_config",
                "description": "Command issued to set the complete device configuration such as current region details, ethernet & wifi configuration, end point configuration,  event and alert configuration\n\n**Download pdf:** 📄 [Download set_config as PDF](https://aa5123.github.io/zebra-rfd40-rfd90-iot-docs/command-pdfs/set_config.pdf)\n\n**Status / Error Codes**\n\n| Code | Status Constant | Description |\n|------|----------------|-------------|\n| 0 | `IOT_STATUS_SUCCESS` | Success |\n| 2 | `IOT_ERROR_INVALID_PAYLOAD` | Invalid payload |\n| 10 | `IOT_ERROR_CONFIG_ALREADY_EXIST` | Configuration already exist |\n| 15 | `IOT_ERROR_SSID_NOT_FOUND` | WIFI Error - SSID not found |\n| 17 | `IOT_ERROR_SSID_MISSED` | WIFI Error - SSID missed |\n| 18 | `IOT_ERROR_SSID_ALREADY_EXIST` | WIFI Error - SSID already exist |\n| 19 | `IOT_ERROR_SSID_LIMIT_OVERFLOW` | WIFI Error - SSID count overflow |\n| 20 | `IOT_ERROR_WIFI_INTER_NOT_SUPPORTED` | Wifi is not supported |\n| 23 | `IOT_ERROR_INVALID_ENUM` | Invalid enum value |\n| 25 | `IOT_ERROR_PUBLISH_TOPICS_EXCEEDED` | Max 3 publish topics exceeded |\n| 26 | `IOT_ERROR_SUBSCRIBE_TOPIC_EXCEEDED` | Max 1 subscribe topic exceeded |\n| 27 | `IOT_ERROR_INVALID_TENANTID_LENGTH` | Invalid tenant ID length |",
                "requestBody": {
                    "required": true,
                    "content": {
                        "application/json": {
                            "schema": {
                                "type": "object",
                                "properties": {
                                    "command": {
                                        "type": "string",
                                        "example": "set_config",
                                        "description": "Specifies the operation being performed, in this case, setting the reader configuration."
                                    },
                                    "requestId": {
                                        "type": "string",
                                        "example": "abc123",
                                        "description": "A unique identifier for the request, allowing tracking and debugging of the operation."
                                    },
                                    "configData": {
                                        "type": "object",
                                        "properties": {
                                            "applyAfterReboot": {
                                                "type": "boolean",
                                                "description": "if set to true, configuration changes will be applied after reboot"
                                            },
                                            "wifiConfig": {
                                                "type": "object",
                                                "properties": {
                                                    "interfaceName": {
                                                        "type": "string",
                                                        "description": "The name of the network interface for which the Wi-Fi configuration is being set."
                                                    },
                                                    "enableInterface": {
                                                        "type": "boolean",
                                                        "description": "Specifies whether the network interface should be enabled or disabled."
                                                    },
                                                    "operation": {
                                                        "type": "string",
                                                        "enum": [
                                                            "CREATE",
                                                            "MODIFY"
                                                        ],
                                                        "example": "CREATE",
                                                        "description": "The operation to be performed on the Wi-Fi configuration. It can either create a new configuration or modify an existing one."
                                                    },
                                                    "accessPoint": {
                                                        "type": "object",
                                                        "required": [
                                                            "connect",
                                                            "isPreferred",
                                                            "essid",
                                                            "enableSecurity"
                                                        ],
                                                        "properties": {
                                                            "connect": {
                                                                "type": "boolean",
                                                                "description": "Indicates whether to connect to this profile. If true, disconnects the currently connected profile and connects to the specified one; if false, just saves the profile."
                                                            },
                                                            "isPreferred": {
                                                                "type": "boolean",
                                                                "description": "Marks this profile as the preferred one to always connect to when available."
                                                            },
                                                            "autoConn": {
                                                                "type": "boolean",
                                                                "description": "Reserved for backward compatibility. It will be removed in the future."
                                                            },
                                                            "essid": {
                                                                "type": "string",
                                                                "example": "ZWireless",
                                                                "description": "The ESSID (network name) of the access point."
                                                            },
                                                            "enableSecurity": {
                                                                "type": "boolean",
                                                                "description": "Indicates whether security is enabled for this access point."
                                                            },
                                                            "ipv4Configuration": {
                                                                "type": "object",
                                                                "properties": {
                                                                    "ipAddress": {
                                                                        "type": "string",
